<!-- components/editor/editor.html -->

<!-- RODINHA DE CARREGAMENTO INICIAL -->
<div id="editor-loading" style="display: none; height: 100%; width: 100%; align-items: center; justify-content: center; flex-direction: column; gap: 15px; color: var(--text-muted);">
    <div class="spinner" style="width: 30px; height: 30px; border-top-color: var(--primary);"></div>
    <p style="font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">A sincronizar inteligência...</p>
</div>

<div id="editor-container" style="display: none; max-width: 850px; margin: 0 auto; width: 100%; padding-bottom: 100px; padding-top: 10px;">
        
    <!-- BARRA DE ABAS SUPERIOR (Browser de Notas) -->
    <div id="editor-tabs-wrapper" style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 2px; overflow-x: auto; scrollbar-width: none;">
        <div id="editor-tabs-list" style="display: flex; gap: 4px;"></div>
        <button id="btn-abrir-browser" style="background: none; border: none; cursor: pointer; padding: 6px 10px;" title="Explorar Notas">
            <i class="fa-solid fa-window-maximize" style="color: #fff;"></i>
        </button>
    </div>
    
    <!-- CABEÇALHO DA NOTA -->
    <div id="editor-header" style="margin-bottom: 25px; display:flex; flex-direction:column; gap:8px;">
        <div id="editor-title-row" style="display: flex; align-items: flex-start; gap: 18px; min-width: 0;">
            <div id="editor-title-area" style="flex: 1; min-width: 0;">
                <h1 id="editor-titulo" style="font-size: 24px; color: var(--text-main); font-weight: 600; outline: none;" contenteditable="true" spellcheck="false">Nome da Nota</h1>
                
                <div id="editor-meta-row" style="display: flex; align-items: center; gap: 15px; margin-top: 5px; flex-wrap: wrap;">
                    <div style="font-size: 11px; color: var(--text-muted);" id="editor-info-text">Sincronizado</div>

                    <button id="btn-modo-edicao-share" style="display: none; background: #ef4444; color: white; border: none; padding: 4px 12px; border-radius: 4px; font-weight: 800; cursor: pointer; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.2s;">
                        <i class="fa-solid fa-pen"></i> Editar Nota
                    </button>

                    <div id="editor-header-actions" style="display: flex; gap: 18px; color: var(--text-muted); font-size: 16px; margin-left: auto; flex-shrink: 0;">
                        <i class="fa-solid fa-clock-rotate-left" id="btn-editor-restaurar" style="cursor: pointer;" title="Hist&#243;rico e Backups" aria-label="Hist&#243;rico e Backups"></i>
                        <i class="fa-solid fa-flask" id="btn-editor-lab" style="cursor: pointer;" title="Laborat&#243;rio de Modos" aria-label="Laborat&#243;rio de Modos"></i>
                        <i class="fa-solid fa-tag" id="btn-editor-tags" style="cursor: pointer;" title="Conex&#245;es e Tags" aria-label="Conex&#245;es e Tags"></i>
                        <i class="fa-solid fa-share-nodes" style="cursor: pointer;" title="Partilhar" aria-label="Partilhar"></i>
                    </div>
                </div>

                <div id="arquivo-tabs-container" style="display: none; margin-top: 15px; border-bottom: 1px solid var(--border-color);">
                    <div style="display: flex; align-items: center; justify-content: space-between; padding-bottom: 5px;">
                        <div style="display: flex; gap: 20px;">
                            <span id="tab-arquivo-feed" class="aba-item active" style="cursor:pointer">FEED</span>
                            <span id="tab-arquivo-gestao" class="aba-item" style="cursor:pointer">ARQUIVO</span>
                        </div>

                        <div style="display: flex; align-items: center; gap: 15px; padding-right: 5px;">
                            <i class="fa-solid fa-paperclip" id="btn-vincular-arquivo-global" 
                               style="display:none; cursor:pointer; font-size: 14px; color: var(--primary); transition: 0.2s;" 
                               title="Arquivar Blocos nesta Gaveta/Prateleira"></i>

                            <i class="fa-solid fa-pen-to-square" id="btn-editar-arquivo-toggle" 
                               style="display:none; cursor:pointer; font-size: 12px; color: var(--text-muted); transition: 0.2s;" 
                               title="Modo Edição de Pastas"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ÁREA CENTRAL DO FEED (Onde as ferramentas são injetadas) -->
    <div id="editor-feed" style="display: flex; flex-direction: column; gap: 20px;"></div>

</div>

<!-- PLACEHOLDER PARA QUANDO NÃO HÁ NOTA ABERTA -->
<div id="editor-placeholder" style="display: flex; height: 100%; align-items: center; justify-content: center; flex-direction: column; color: var(--text-muted);">
    <i class="fa-solid fa-feather-pointed" style="font-size: 40px; margin-bottom: 15px; opacity: 0.5;"></i>
    <p style="font-size: 14px; font-weight: 500;">Seleciona uma nota na barra lateral para começar.</p>
</div>
