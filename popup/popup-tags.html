<div id="popup-tags-overlay" class="popup-overlay" style="z-index: 9996;">
    <div class="popup-content" style="max-width: 700px; width: 95%;">
        <div class="popup-header">
            <h3>Centro de Conexões</h3>
            <button id="btn-fechar-tags"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div style="padding: 16px 16px 0 16px;">
            <div class="sub-tabs" style="display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 8px; scrollbar-width: none; padding-bottom: 5px;">
                <button class="tab-tags active" data-target="tags-hub"><i class="fa-solid fa-grid-2"></i> Hub</button>
                <button class="tab-tags" data-target="tags-neuronios"><i class="fa-solid fa-brain"></i> Neurónios</button>
                <button class="tab-tags" data-target="tags-associar" style="flex-shrink: 0; white-space: nowrap;"><i class="fa-solid fa-diagram-project"></i> Associar</button>
                <button class="tab-tags" data-target="tags-topicos" style="flex-shrink: 0; white-space: nowrap;"><i class="fa-solid fa-layer-group"></i> Tópicos</button>
                <button class="tab-tags" data-target="tags-referencias" style="flex-shrink: 0; white-space: nowrap;"><i class="fa-solid fa-link"></i> Referências</button>
                <button class="tab-tags" data-target="tags-codex" style="flex-shrink: 0; white-space: nowrap;"><i class="fa-brands fa-artstation"></i> Codex</button>
            </div>
        </div>

        <div style="padding: 20px; min-height: 450px; max-height: 75vh; overflow-y: auto; background-color: var(--bg-body); border-bottom-left-radius: var(--radius-md); border-bottom-right-radius: var(--radius-md);">
            <div id="tags-hub" class="tags-tab-content" style="display: block;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; border-bottom:1px solid var(--border-color); padding-bottom:10px;">
                    <p style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Visão unificada</p>
                </div>
                <div id="tags-hub-list" style="display:flex; flex-direction:column; gap:10px;"></div>
            </div>

            <div id="tags-neuronios" class="tags-tab-content" style="display: none;">
                <div style="margin-bottom: 30px;">
                    <p style="color: var(--primary); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 12px;">
                        <i class="fa-solid fa-book-open"></i> Conexão Bíblica
                    </p>
                    <div style="position: relative;">
                        <input type="text" id="search-biblia-neuronios" placeholder="Pesquisar texto (ex: Dan 1:1)..." style="width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 4px; color: white; outline: none;">
                        <div id="results-biblia-neuronios" class="tags-search-results"></div>
                    </div>
                    <div id="selected-biblia-neuronios" class="pill-container"></div>
                </div>

                <div style="height: 1px; background: var(--border-color); margin: 25px 0; opacity: 0.5;"></div>

                <div>
                    <p style="color: #d49d06; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 12px;">
                        <i class="fa-solid fa-meteor"></i> Vínculo Cosmos
                    </p>
                    <div style="position: relative;">
                        <input type="text" id="search-cosmos-neuronios" placeholder="Pesquisar tema..." style="width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 4px; color: white; outline: none;">
                        <div id="results-cosmos-neuronios" class="tags-search-results"></div>
                    </div>
                    <div id="selected-cosmos-neuronios" class="pill-container"></div>
                </div>
            </div>

            <div id="tags-referencias" class="tags-tab-content" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                    <p style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Referências Externas</p>
                    <div style="display: flex; gap: 8px;">
                        <button id="btn-add-ref-completa" class="btn-action-circle primary-icon" title="Referência Completa"><i class="fa-solid fa-file-circle-plus"></i></button>
                        <button id="btn-add-apenas-links" class="btn-action-circle" title="Apenas Link Direto"><i class="fa-solid fa-link"></i></button>
                    </div>
                </div>
                <div id="container-referencias-cards" style="display: flex; flex-direction: column; gap: 15px;"></div>
            </div>

            <div id="tags-topicos" class="tags-tab-content" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                    <p style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Taxonomia de Tópicos</p>
                    <button id="btn-abrir-form-topico" class="btn-action-circle primary-icon" title="Adicionar Novo Vínculo"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="lista-vinc-topicos" class="pill-container" style="margin-bottom: 20px; min-height: 10px;"></div>
                <div id="area-form-topicos" style="display: none; background: rgba(255,255,255,0.02); padding: 18px; border-radius: 8px; border: 1px solid var(--border-color); animation: fadeIn 0.2s ease-out;">
                    <div style="margin-bottom: 25px;">
                        <label style="display:block; font-size:10px; color:var(--primary); margin-bottom:8px; text-transform:uppercase; font-weight: 700;">1. Escolher Tópico Principal</label>
                        <div style="position: relative;">
                            <input type="text" id="search-tags-topico" placeholder="Procurar tópico..." style="width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border-color); border-radius: 4px; color: white; outline: none;">
                            <div id="results-tags-topico" class="tags-search-results"></div>
                        </div>
                        <div id="selected-tags-topico-display" style="margin-top:10px;"></div>
                    </div>

                    <div id="section-tags-subtopico" style="opacity: 0.3; pointer-events: none; transition: 0.3s;">
                        <label style="display:block; font-size:10px; color:var(--primary); margin-bottom:8px; text-transform:uppercase; font-weight: 700;">2. Escolher Subtópico</label>
                        <div style="position: relative;">
                            <input type="text" id="search-tags-subtopico" placeholder="Procurar subtópico..." style="width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border-color); border-radius: 4px; color: white; outline: none;">
                            <div id="results-tags-subtopico" class="tags-search-results"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tags-associar" class="tags-tab-content" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <p style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Vínculos Relacionais</p>
                    <button id="btn-mostrar-explorador-associar" class="btn-amt" style="width: auto; padding: 0 15px; height: 28px;">Mostrar Explorador</button>
                </div>
                <div id="explorador-associar" style="display: none; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; margin-bottom: 20px; max-height: 250px; overflow-y: auto;">
                    <div id="arvore-associar-content"></div>
                </div>
                <div id="lista-associados-vivos" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>

            <div id="tags-codex" class="tags-tab-content" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                    <p style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Mapeamento Bibliográfico</p>
                    <button id="btn-add-codex-card" class="btn-action-circle primary-icon" title="Novo Mapeamento Codex"><i class="fa-solid fa-plus"></i></button>
                </div>
                <div id="container-codex-cards" style="display: flex; flex-direction: column; gap: 15px;"></div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
