<!-- components/popup/popup-restaurar.html -->
<div id="popup-restaurar-overlay" class="popup-overlay" style="z-index: 9999;">
    <div class="popup-content" style="max-width: 500px; width: 95%;">
        
        <div class="popup-header">
            <h3>Centro de Recuperação</h3>
            <button id="btn-fechar-restaurar"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div style="padding: 16px 16px 0 16px;">
            <div class="sub-tabs" style="display: flex; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                <button class="tab-restaurar active" data-target="tab-backup" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Backup
                </button>
                <button class="tab-restaurar" data-target="tab-reciclagem" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fa-solid fa-trash-can"></i> Reciclagem
                </button>
                <button class="tab-restaurar" data-target="tab-historico" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <i class="fa-solid fa-clock-rotate-left"></i> Histórico
                </button>
            </div>
        </div>

        <div style="padding: 20px; height: 400px; overflow-y: auto; background-color: var(--bg-body);">
            
            <!-- ABA BACKUP -->
            <div id="tab-backup" class="restaurar-tab-content" style="display: block;">
                
                <div style="background: rgba(99, 102, 241, 0.05); border: 1px dashed var(--primary); padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; text-align: center;">
                    <p style="color: var(--text-muted); font-size: 11px; line-height: 1.5; margin-bottom: 15px; max-width: 280px;">
                        Cria um ponto de restauro manual para segurança.
                    </p>
                    
                    <!-- BOTÃO REFORMULADO (TAMANHO CONTROLADO) -->
                    <button id="btn-criar-backup" style="width: auto; min-width: 200px; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 11px; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);">
                        <i class="fa-solid fa-plus"></i> CRIAR CÓPIA DE SEGURANÇA
                    </button>
                </div>

                <p style="color: var(--primary); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; margin-bottom: 15px;">
                    BACKUPS REGISTADOS
                </p>
                
                <div id="lista-backups-firestore" style="display: flex; flex-direction: column; gap: 8px;">
                </div>
            </div>
            
            <!-- OUTRAS ABAS -->
            <div id="tab-reciclagem" class="restaurar-tab-content" style="display: none;">
                <div id="lista-reciclagem-caixas"></div>
            </div>
            
            <div id="tab-historico" class="restaurar-tab-content" style="display: none;"></div>

        </div>
    </div>
</div>

<style>
    .tab-restaurar { background: transparent; border: none; color: var(--text-muted); font-size: 11px; font-weight: 600; cursor: pointer; padding: 10px 5px; transition: 0.2s; border-bottom: 2px solid transparent; text-transform: uppercase; }
    .tab-restaurar.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
</style>
