<!-- Repara no z-index 9995 para ficar por cima do popup das cores -->
<div id="popup-editar-cor-overlay" class="popup-overlay" style="z-index: 9995;"> 
    <div class="popup-content" style="width: 280px; text-align: center; padding: 24px;">
        <h3 style="color: var(--text-main); margin-bottom: 15px; font-size: 15px;">Editar Nome da Cor</h3>
        
        <!-- Mostrador visual da cor que estamos a editar -->
        <div id="amostra-cor-edicao" style="width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 15px auto; border: 2px solid rgba(0,0,0,0.1);"></div>
        
        <input type="text" id="input-nome-cor" placeholder="Novo nome..." style="width: 100%; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); color: white; border-radius: var(--radius-sm); outline: none; margin-bottom: 20px;">
        
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button id="btn-cancelar-nome-cor" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s;">Cancelar</button>
            <button id="btn-guardar-nome-cor" style="flex: 1; padding: 10px; background: var(--primary); border: none; color: white; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s;">Guardar</button>
        </div>
    </div>
</div>
