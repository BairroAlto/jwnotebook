<div id="popup-topicos-overlay" class="popup-overlay" style="z-index: 9997;">
    <div class="popup-content" style="max-width: 450px; width: 95%;">
        <div class="popup-header">
            <h3 id="titulo-popup-topico">Novo Tópico / Subtópico</h3>
            <button id="btn-fechar-topico"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <!-- ABAS -->
        <div style="padding: 16px 16px 0 16px;">
            <div class="sub-tabs">
                <button class="tab-topico active" data-target="form-topico">Criar Tópico</button>
                <button class="tab-topico" data-target="form-subtopico">Criar Subtópico</button>
            </div>
        </div>

        <div style="padding: 20px; max-height: 70vh; overflow-y: auto;">
            
            <!-- FORMULÁRIO TÓPICO -->
            <div id="form-topico" class="topico-tab-content">
                <label style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase;">Nome do Tópico</label>
                <input type="text" id="topico-nome" placeholder="Ex: Profecias, Família..." style="width:100%; margin-bottom:20px;">
                
                <label style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:10px; text-transform:uppercase;">Escolher Cor (Opcional)</label>
                <div id="topico-cor-selector" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
                    <!-- Injetado via JS: Vermelho, Amarelo, Laranja, Castanho, Azul, Lilás, Cinzento -->
                </div>
            </div>

            <!-- FORMULÁRIO SUBTÓPICO -->
<div id="form-subtopico" class="topico-tab-content" style="display: none;">
    <label style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase;">Tópicos Pai</label>
    
    <!-- NOVO DROPDOWN MULTI-SELEÇÃO -->
    <div class="multi-select-wrapper" style="position: relative; margin-bottom: 15px;">
        <div id="topicos-pai-select-head" style="width: 100%; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-muted);">
            <span id="texto-selecionados">Selecionar Tópicos...</span>
            <i class="fa-solid fa-chevron-down"></i>
        </div>
        <div id="container-dropdown-pais" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-panel); border: 1px solid var(--primary); border-radius: 0 0 4px 4px; z-index: 100; max-height: 180px; overflow-y: auto; padding: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
            <!-- Checkboxes injetados via JS -->
        </div>
    </div>
    
    <p id="aviso-espelho" style="display:none; font-size: 10px; color: #fbbf24; background: rgba(251,191,36,0.1); padding: 8px; border-radius: 4px; margin-bottom: 15px; line-height: 1.4;">
        <i class="fa-solid fa-triangle-exclamation"></i> <b>Nota:</b> Ao escolher mais de um tópico, as informações serão exibidas de forma igual (espelho).
    </p>

    <label style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:8px; text-transform:uppercase;">Nome do Subtópico</label>
    <input type="text" id="subtopico-nome" placeholder="Ex: Daniel, Educação Filhos..." style="width:100%;">
</div>

        </div>

    <div class="popup-footer" style="padding: 15px; border-top: 1px solid var(--border-color); text-align: right; display: flex; align-items: center; justify-content: space-between; gap: 10px;">
    <button id="btn-ocultar-topico" style="display:none; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;">OCULTAR</button>
    <button id="btn-gravar-topico" style="background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-left: auto;">Gravar</button>
</div>
    </div>
</div>
