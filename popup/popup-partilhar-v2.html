<!-- Popup Principal de Partilha -->
<div id="popup-partilhar-v2-overlay" class="popup-overlay" style="z-index: 10500;">
    <div class="popup-content" style="max-width: 450px; width: 95%;">
        <div class="popup-header">
            <h3>Partilhar Nota</h3>
            <button id="btn-fechar-partilhar-v2"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div style="padding: 20px; max-height: 75vh; overflow-y: auto;">
            <!-- SECÇÃO AMIGOS -->
            <p style="font-size: 10px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 15px;">Partilhar com Amigos</p>
            <div id="lista-amigos-partilha" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 30px;">
                <!-- Amigos injetados via JS -->
            </div>

            <div style="height: 1px; background: var(--border-color); margin: 20px 0;"></div>

            <!-- SECÇÃO LINK (Apenas Interface por agora) -->
<p style="font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 15px;">Enviar Link Direto</p>

<button id="btn-gerar-link-rua" style="width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px dashed var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer;">
    <i class="fa-solid fa-link"></i> Gerar Link de Cópia
</button>

<!-- NOVO: Contentor para links gerados -->
<div id="lista-links-publicos-ativos" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
    <!-- Links injetados aqui -->
</div>
        </div>
    </div>
</div>

<!-- Popup de Opções de Convite -->
<div id="popup-opcoes-convite-overlay" class="popup-overlay" style="z-index: 10510;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <h3 id="nome-amigo-convite" style="margin-bottom: 20px; font-size: 16px;">Convidar Amigo</h3>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button id="btn-convite-total" style="padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;">
                Desbloquear todas as caixas
            </button>
            <button id="btn-convite-personalizar" style="padding: 14px; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;">
                Personalizar
            </button>
        </div>
    </div>
</div>

<!-- Popup de Personalização (Filtro de Caixas) -->
<div id="popup-personalizar-partilha-overlay" class="popup-overlay" style="z-index: 10520;">
    <div class="popup-content" style="max-width: 500px; width: 95%;">
        <div class="popup-header">
            <h3>Personalizar Conteúdo</h3>
            <button id="btn-cancelar-personalizacao"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="lista-caixas-personalizar" style="padding: 20px; max-height: 400px; overflow-y: auto; background: var(--bg-body);">
            <!-- Lista de caixas com toggles -->
        </div>
        <div class="popup-footer" style="padding: 15px; text-align: right; border-top: 1px solid var(--border-color);">
            <button id="btn-finalizar-clonagem" style="background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 6px; font-weight: 700; cursor: pointer;">
                Enviar Convite
            </button>
        </div>
    </div>
</div>
