<!-- components/popup/popup-partilhar.html -->
<div id="popup-partilhar-overlay" class="popup-overlay" style="z-index: 9992;">
    <div class="popup-content" style="width: 400px; max-width: 95%;">
       <div class="popup-header">
    <h3>Partilhar Secção</h3>
    <!-- ADICIONADO ONCLICK DIRETO AQUI -->
    <button id="btn-fechar-partilhar" onclick="window.fecharPopupPartilhar()">
        <i class="fa-solid fa-xmark"></i>
    </button>
</div>
        
        <div style="padding: 16px 16px 0 16px;">
            <div class="sub-tabs">
                <!-- ADICIONADO ONCLICK DIRETO -->
                <button class="tab-partilha active" data-origem="Local" onclick="window.trocarAbaPartilha(this, 'Local')">
                    <i class="fa-solid fa-house-user"></i> Local
                </button>
                <button class="tab-partilha" data-origem="Share" onclick="window.trocarAbaPartilha(this, 'Share')">
                    <i class="fa-solid fa-share-nodes"></i> Share
                </button>
            </div>
        </div>
        
        <div style="padding: 16px;">
            <p style="font-size: 11px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 10px;">Enviar cópia para:</p>
            <div id="arvore-partilha" style="background: var(--bg-body); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 10px; height: 200px; overflow-y: auto; margin-bottom: 20px;">
                <!-- Lista injetada aqui -->
            </div>

            <div style="height: 1px; background: var(--border-color); margin: 20px 0; opacity: 0.5;"></div>

            <!-- CONTENTOR DO TOGGLE COM ID PARA OCULTAR -->
    <div id="area-toggle-protecao" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <p style="font-size: 13px; color: var(--text-main); font-weight: 500; margin: 0;">Desbloquear para partilha</p>
            <p style="font-size: 11px; color: var(--text-muted); margin: 0;">Permite que terceiros leiam/editem</p>
        </div>
        <label class="switch-container">
            <input type="checkbox" id="toggle-protecao">
            <span class="switch-slider"></span>
        </label>
        
            </div>
        </div>
    </div>
</div>

<!-- Popup de Confirmação de Envio -->
<div id="popup-confirmar-envio-overlay" class="popup-overlay" style="z-index: 10000;">
    <div class="popup-content" style="width: 320px; text-align: center; padding: 25px;">
        <div style="color: var(--primary); font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-paper-plane"></i>
        </div>
        <h3 style="color: white; font-size: 16px; margin-bottom: 10px;">Enviar Cópia?</h3>
        <p id="texto-confirmar-envio" style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5;">
            Desejas enviar uma cópia desta secção para "Nome da Nota"?
        </p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-envio" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: 600;">Cancelar</button>
            <button id="btn-confirmar-envio" style="flex: 1; padding: 10px; background: var(--primary); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 700;">Sim, Enviar</button>
        </div>
    </div>
</div>
