<div id="popup-share-nota-overlay" class="popup-overlay" style="z-index: 10001;">
    <div class="popup-content" style="max-width: 400px; width: 95%;">
        <div class="popup-header">
            <h3>Gestão de Colaboradores</h3>
            <button onclick="document.getElementById('popup-share-nota-overlay').classList.remove('active')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div style="padding: 20px; background: var(--bg-body); max-height: 70vh; overflow-y: auto;">
            
            <p style="font-size: 10px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 12px;">Convidar Amigos</p>
            <div id="lista-amigos-para-convite" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 30px;">
                <!-- Amigos aparecem aqui -->
            </div>

            <p style="font-size: 10px; color: #22c55e; font-weight: 800; text-transform: uppercase; margin-bottom: 12px;">Pessoas com Acesso</p>
            <div id="lista-colaboradores-ativos" style="display: flex; flex-direction: column; gap: 8px;">
                <!-- Aprovados aparecem aqui -->
            </div>
        </div>
    </div>
</div>
