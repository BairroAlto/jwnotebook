<div id="popup-cv-imagem-overlay" class="popup-overlay" style="z-index: 10002;">
    <div class="popup-content" style="max-width: 350px; padding: 25px;">
        <h3 style="color: #d4af37; font-size: 16px; margin-bottom: 15px;">Configurar Imagem</h3>
        
        <label style="display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:5px;">Hiperligação da Imagem</label>
        <input type="text" id="cv-input-url" placeholder="https://..." style="width:100%; margin-bottom:20px;">

        <label style="display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:5px;">Dimensão da Miniatura</label>
        <select id="cv-input-dimensao" style="width:100%; padding:10px; background:var(--bg-body); color:white; border:1px solid var(--border-color); border-radius:4px; margin-bottom:25px;">
            <option value="pequena">Pequena (100px)</option>
            <option value="media">Média (150px)</option>
            <option value="grande">Grande (200px)</option>
        </select>
        
        <div style="display: flex; gap: 10px;">
            <button id="cv-btn-cancelar" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer;">Cancelar</button>
            <button id="cv-btn-guardar" style="flex: 1; padding: 10px; background: #d4af37; border: none; color: #000; border-radius: 6px; cursor: pointer; font-weight: 700;">Guardar</button>
        </div>
    </div>
</div>
