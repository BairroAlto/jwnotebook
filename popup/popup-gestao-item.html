<!-- Popup de Opções para Pasta ou Nota -->
<div id="popup-gestao-item-overlay" class="popup-overlay" style="z-index: 10100;">
    <div class="popup-content" style="max-width: 320px;">
        <div class="popup-header">
            <h3 id="gestao-item-titulo">Gerir Item</h3>
            <button onclick="document.getElementById('popup-gestao-item-overlay').classList.remove('active')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="popup-options">
            <button id="btn-opcao-mover">
                <i class="fa-solid fa-folder-tree" style="color: var(--primary);"></i> Mudar de Pasta
            </button>
            <button id="btn-opcao-renomear" style="opacity: 0.5; cursor: not-allowed;">
                <i class="fa-solid fa-pen-to-square"></i> Mudar Nome (Brevemente)
            </button>
        </div>
    </div>
</div>

<!-- Popup da Árvore de Destino (Mover) -->
<div id="popup-mover-item-overlay" class="popup-overlay" style="z-index: 10110;">
    <div class="popup-content" style="max-width: 400px; width: 95%;">
        <div class="popup-header">
            <h3>Escolher Pasta de Destino</h3>
            <button onclick="document.getElementById('popup-mover-item-overlay').classList.remove('active')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div style="padding: 15px;">
            <p style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; font-weight: 800;">
                Mover para:
            </p>
            <div id="arvore-mover-local" style="background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; height: 250px; overflow-y: auto;">
                <!-- Árvore injetada aqui -->
            </div>
            <div style="margin-top: 15px; text-align: right; font-size: 11px; color: var(--text-muted);">
                Selecionado: <b id="nome-pasta-selecionada" style="color: var(--primary);">Nenhuma</b>
            </div>
        </div>
        <div class="popup-footer" style="padding: 15px; border-top: 1px solid var(--border-color); text-align: right;">
            <button id="btn-confirmar-movimentacao" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; opacity: 0.5;" disabled>
                Mover Agora
            </button>
        </div>
    </div>
</div>
