<!-- components/popup/popup-confirmar.html -->
<div id="popup-confirmar-overlay" class="popup-overlay">
    <div class="popup-content" style="text-align: center; padding: 24px;">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 40px; color: #ef4444; margin-bottom: 15px;"></i>
        <h3 style="color: var(--text-main); margin-bottom: 10px; font-size: 16px;">Deseja Ocultar esta Secção?</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 24px;">A secção deixará de estar visível, mas não será apagada da base de dados.</p>
        
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button id="btn-cancelar-ocultar" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s;">Cancelar</button>
            <button id="btn-confirmar-ocultar" style="flex: 1; padding: 10px; background: #ef4444; border: none; color: white; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s;">Sim, Ocultar</button>
        </div>
    </div>
</div>
