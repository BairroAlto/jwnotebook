<!-- components/popup/popup-lab.html -->
<div id="popup-lab-overlay" class="popup-overlay" style="z-index: 10006;">
    <div class="popup-content" style="max-width: 380px; border-radius: 16px; overflow: hidden;">
        
        <div class="popup-header" style="background: rgba(0,0,0,0.2); padding: 20px;">
            <h3 style="font-size: 15px; letter-spacing: 0.5px;">LABORATÓRIO
            </h3>
            <button onclick="document.getElementById('popup-lab-overlay').classList.remove('active')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="lab-container" id="lab-options-list">
            
            <!-- MODO NORMAL (Botão de Reset) -->
            <div class="lab-item" data-mode="normal" onclick="window.alterarModoNota('normal')">
                <div class="lab-icon"><i class="fa-solid fa-file-lines"></i></div>
                <div class="lab-info">
                    <span class="lab-title">Modo Normal</span>
                    <span class="lab-desc">Escrita sequencial padrão</span>
                </div>
                <div class="lab-status"><i class="fa-solid fa-circle-check"></i></div>
            </div>

            <div class="lab-divider">MODOS DE NOTA</div>

            <!-- MODO ARQUIVO -->
            <div class="lab-item" data-mode="arquivo" onclick="window.alterarModoNota('arquivo')">
                <div class="lab-icon archi"><i class="fa-solid fa-file-circle-plus"></i></div>
                <div class="lab-info">
                    <span class="lab-title">Modo Arquivo</span>
                    <span class="lab-desc">Gestão por gavetas e prateleiras</span>
                </div>
                <div class="lab-status"><i class="fa-solid fa-circle-check"></i></div>
            </div>

            <!-- MODO POST -->
            <div class="lab-item" data-mode="post" onclick="window.alterarModoNota('post')">
                <div class="lab-icon post"><i class="fa-solid fa-envelopes-bulk"></i></div>
                <div class="lab-info">
                    <span class="lab-title">Modo Post</span>
                    <span class="lab-desc">Feed invertido (mais recentes primeiro)</span>
                </div>
                <div class="lab-status"><i class="fa-solid fa-circle-check"></i></div>
            </div>


            <div class="lab-divider">AUXÍLIARES</div>


            <!-- MODO GLOBAL (Futuro) -->
            <div class="lab-item" data-mode="global" onclick="window.alterarModoNota('global')">
                <div class="lab-icon glob"><i class="fa-solid fa-satellite"></i></div>
                <div class="lab-info">
                    <span class="lab-title">Pesquisa Global</span>
                    <span class="lab-desc">Indexação em toda a rede</span>
                </div>
                <div class="lab-status"><i class="fa-solid fa-circle-check"></i></div>
            </div>

             <div class="lab-divider">NEXO</div>

            <!-- BOTÃO PARA INSERIR FERRAMENTA -->
            <div class="lab-item nexo-trigger" onclick="window.abrirFerramentasDoNexo()">
                <div class="lab-icon nexo"><i class="fa-solid fa-box-open"></i></div>
                <div class="lab-info">
                    <span class="lab-title">Inserir Bloco</span>
                    <span class="lab-desc">Adicionar nova ferramenta a esta nota</span>
                </div>
                <div class="lab-status" style="opacity: 1; transform: scale(1); color: var(--text-muted);">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </div>




        </div>
    </div>
</div>

<style>
    .lab-container {
        padding: 15px;
        background: var(--bg-panel);
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .lab-divider {
        font-size: 9px;
        font-weight: 800;
        color: var(--text-muted);
        padding: 15px 5px 5px 5px;
        letter-spacing: 2px;
        opacity: 0.5;
    }

    .lab-item {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
    }

    .lab-item:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.1);
        transform: translateX(4px);
    }

    /* Cores dos Ícones */
    .lab-icon {
        width: 40px;
        height: 40px;
        background: rgba(99, 102, 241, 0.1);
        color: #6366f1;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        margin-right: 15px;
    }

    .lab-icon.archi { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
    .lab-icon.post { background: rgba(244, 63, 94, 0.1); color: #f43f5e; }
    .lab-icon.glob { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }

    .lab-info {
        display: flex;
        flex-direction: column;
        flex: 1;
    }

    .lab-title {
        font-size: 14px;
        font-weight: 700;
        color: #f8fafc;
    }

    .lab-desc {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
    }

    /* Estado Ativo */
    .lab-status {
        color: var(--primary);
        font-size: 18px;
        opacity: 0;
        transform: scale(0.5);
        transition: 0.2s;
    }

    .lab-item.active {
        background: rgba(99, 102, 241, 0.08);
        border-color: var(--primary);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .lab-item.active .lab-status {
        opacity: 1;
        transform: scale(1);
    }

    /* Se o Modo Normal estiver ativo, os outros não brilham */
    .lab-item[data-mode="normal"].active {
        background: rgba(255, 255, 255, 0.05);
        border-color: #94a3b8;
    }
    .lab-item[data-mode="normal"].active .lab-status { color: #94a3b8; }


 /* Estilo para a nova cor do ícone Nexo */
    .lab-icon.nexo { 
        background: rgba(255, 255, 255, 0.05); 
        color: var(--text-main); 
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .nexo-trigger:hover .lab-icon.nexo {
        background: var(--primary);
        border-color: var(--primary);
        color: white;
    }

</style>
