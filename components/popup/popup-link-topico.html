<!-- components/popup/popup-link-topico.html -->
<div id="popup-link-topico-overlay" class="popup-overlay" style="z-index: 10015;">
    <div class="popup-content" style="max-width: 380px; padding: 25px;">
        <h3 style="color: var(--primary); font-size: 16px; margin-bottom: 20px;">Configurar Link</h3>
        
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label style="display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:5px; font-weight: 700;">Hiperligação (URL)</label>
                <input type="text" id="link-topico-url" placeholder="https://..." style="width:100%; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); color: white; border-radius: 6px;">
            </div>

            <div>
                <label style="display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:5px; font-weight: 700;">Título / Descrição (Opcional)</label>
                <input type="text" id="link-topico-titulo" placeholder="Ex: Artigo da Sentinela..." style="width:100%; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); color: white; border-radius: 6px;">
            </div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button id="btn-cancelar-link-topico" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: 600;">Cancelar</button>
            <button id="btn-gravar-link-topico" style="flex: 1; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 700;">Gravar Link</button>
        </div>
    </div>
</div>
