<div id="popup-recycle-viewer-overlay" class="popup-overlay" style="z-index: 12000;">
    <div class="popup-content" style="max-width: 500px; width: 95%; border-radius: 16px;">
        <div class="popup-header" style="background: rgba(0,0,0,0.2); padding: 15px 20px;">
            <h3 id="recycle-viewer-title" style="font-size: 15px;">Pré-visualização</h3>
            <button onclick="RecycleViewer.fechar()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="recycle-viewer-body" style="padding: 25px; max-height: 60vh; overflow-y: auto; background: var(--bg-body);">
            <!-- Texto injetado pelo JS -->
        </div>
        <div class="popup-footer" style="padding: 15px; text-align: center; border-top: 1px solid var(--border-color);">
            <button onclick="RecycleViewer.fechar()" style="background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: 700; cursor: pointer;">FECHAR</button>
        </div>
    </div>
</div>
