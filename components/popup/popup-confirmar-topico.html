<div id="popup-confirmar-topico-overlay" class="popup-overlay" style="z-index: 10000;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #ef4444; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-eye-slash"></i>
        </div>
        <h3 style="color: var(--text-main); font-size: 16px; margin-bottom: 10px;">Ocultar Item?</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">
            Este item deixará de estar visível nas tuas listas, mas os dados não serão apagados.
        </p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-ocultar-topico" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; cursor: pointer;">Cancelar</button>
            <button id="btn-confirmar-ocultar-topico" style="flex: 1; padding: 10px; background: #ef4444; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 600;">Sim, Ocultar</button>
        </div>
    </div>
</div>
