<!-- components/popup/popup-cores.html -->
<div id="popup-cores-overlay" class="popup-overlay">
    <div class="popup-content">
        <div class="popup-header">
            <h3>Centro de Personalização</h3>
            <button id="btn-fechar-cores"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div style="padding: 16px 16px 0 16px;">
            <div class="sub-tabs">
                <button class="tab-cor active" data-target="tab-destaques">
                    <i class="fa-solid fa-palette"></i> Destaques
                </button>
                <button class="tab-cor" data-target="tab-focos">
                    <i class="fa-solid fa-masks-theater"></i> Focos
                </button>
                <!-- NOVA ABA: MUTAÇÃO -->
                <button class="tab-cor" data-target="tab-mutacao" style="display: none;">
    <i class="fa-solid fa-dna"></i> Mutação
</button>
            </div>
        </div>

        <div style="padding: 16px; height: 350px; overflow-y: auto; background-color: var(--bg-body); border-bottom-left-radius: var(--radius-md); border-bottom-right-radius: var(--radius-md);">
            <div id="tab-destaques" class="cor-tab-content" style="display: block;">
                <div id="lista-cores-destaque" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                <button id="btn-remover-cor" style="width: 100%; margin-top: 15px; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: var(--radius-sm); cursor: pointer;">
                    <i class="fa-solid fa-eraser"></i> Remover Cor
                </button>
            </div>
            
            <div id="tab-focos" class="cor-tab-content" style="display: none;">
                <div id="lista-cores-foco" style="display: grid; grid-template-columns: 1fr; gap: 8px;"></div>
            </div>

            <!-- NOVA ÁREA DE CONTEÚDO: MUTAÇÃO -->
            <div id="tab-mutacao" class="cor-tab-content" style="display: none; padding-top: 10px;">
                <p style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px;">Mudar tipo de ferramenta:</p>
                <div id="lista-mutacoes" style="display: flex; flex-direction: column; gap: 8px;">
                    <!-- Botões de mutação injetados via JS -->
                </div>
            </div>
        </div>
    </div>
</div>
