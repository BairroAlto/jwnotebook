<!-- components/popup/popup-confirmar-restauro.html -->
<div id="popup-confirmar-restauro-overlay" class="popup-overlay" style="z-index: 10003;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #22c55e; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-clock-rotate-left"></i>
        </div>
        <h3 style="color: var(--text-main); font-size: 16px; margin-bottom: 10px;">Restaurar Cópia?</h3>
        <p id="msg-confirmar-restauro" style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">
            Uma nova nota será criada na tua pasta com os dados desta versão.
        </p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-restauro" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer;">Cancelar</button>
            <button id="btn-confirmar-restauro-final" style="flex: 1; padding: 10px; background: #22c55e; border: none; color: black; border-radius: 6px; cursor: pointer; font-weight: 700;">Sim, Restaurar</button>
        </div>
    </div>
</div>
