<!-- components/popup/popup-aviso.html -->
<div id="popup-aviso-overlay" class="popup-overlay" style="z-index: 20000;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #fbbf24; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3 style="color: var(--text-main); font-size: 16px; margin-bottom: 10px;">Atenção</h3>
        <p id="msg-aviso-texto" style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5;">
            <!-- Mensagem injetada via JS -->
        </p>
        
        <button id="btn-fechar-aviso" style="width: 100%; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 700;">Entendido</button>
    </div>
</div>
