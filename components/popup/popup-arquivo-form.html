<!-- components/popup/popup-arquivo-form.html -->
<div id="popup-arquivo-form-overlay" class="popup-overlay" style="z-index: 10110;">
    <div class="popup-content" style="max-width: 400px; padding: 25px;">
        <h3 id="arquivo-form-titulo" style="color: var(--primary); font-size: 16px; margin-bottom: 20px; font-weight: 800; text-transform: uppercase;">Nova Gaveta</h3>
        
        <div style="margin-bottom: 20px;">
            <label style="display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px; font-weight: 700;">Nome da Gaveta</label>
            <input type="text" id="arquivo-form-input" placeholder="Ex: Inspirações, Estudo..." 
                   style="width: 100%; padding: 14px; background: var(--bg-body); border: 1px solid var(--border-color); color: white; border-radius: 10px; outline: none;">
        </div>

        <div style="margin-bottom: 25px;">
            <label style="display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px; font-weight: 700;">Cor de Identificação</label>
            <div id="arquivo-form-cores" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;">
                <!-- Injetado via JS -->
            </div>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-arquivo-form-cancelar" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer;">Cancelar</button>
            <button id="btn-arquivo-form-confirmar" style="flex: 1; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 700;">Criar agora</button>
        </div>
    </div>
</div>
