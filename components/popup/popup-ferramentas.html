<!-- components/popup/popup-ferramentas.html -->
<div id="popup-ferramentas-inline" class="popup-overlay" style="z-index: 9999;">
    <div class="popup-content" style="max-width: 550px; padding: 20px; width: 95%;">
        
        <!-- CABEÇALHO -->
        <div class="popup-header" style="padding: 0 0 15px 0; margin-bottom: 15px; border-bottom: 1px solid var(--border-color);">
            <h3 style="font-size: 14px;">Inserir Ferramenta</h3>
            <button onclick="document.getElementById('popup-ferramentas-inline').classList.remove('active')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <!-- PRIMEIRA LINHA (5 ÍCONES) -->
        <div class="tool-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
            
            <!-- 1. Contentor -->
            <div class="tool-item" onclick="window.inserirFerramentaNoEditor('contentor')" 
                 style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
                <i class="fa-solid fa-box" style="font-size: 20px; color: #ea580c;"></i>
                <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Contentor</span>
            </div>

            <!-- 2. SubNota -->
            <div class="tool-item" onclick="window.inserirFerramentaNoEditor('subnota')" 
                 style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
                <i class="fa-solid fa-box" style="font-size: 20px; color: #3b82f6;"></i>
                <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">SubNota</span>
            </div>

            <!-- 3. Questão -->
            <div class="tool-item" onclick="window.inserirFerramentaNoEditor('questao')" 
                 style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
                <i class="fa-solid fa-box" style="font-size: 20px; color: #10b981;"></i>
                <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Questão</span>
            </div>

            <!-- 4. Raciocínio -->
            <div class="tool-item" onclick="window.inserirFerramentaNoEditor('raciocinio')" 
                 style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
                <i class="fa-solid fa-box" style="font-size: 20px; color: #f59e0b;"></i>
                <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Raciocínio</span>
            </div>

            <!-- 5. Elevador -->
            <div class="tool-item" onclick="window.inserirFerramentaNoEditor('elevador')" 
                 style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
                <i class="fa-solid fa-elevator" style="font-size: 20px; color: #ef4444;"></i>
                <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Elevador</span>
            </div>
        </div>

        <!-- SEPARADOR -->
        <div style="height: 1px; background: var(--border-color); margin: 15px 0; opacity: 0.5;"></div>

        <!-- SEGUNDA LINHA (NOVAS FERRAMENTAS) -->
        <div class="tool-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
            
            <!-- 6. Cartão Visita -->
            <div class="tool-item" onclick="window.inserirFerramentaNoEditor('cartaovisita')" 
                 style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
                <i class="fa-solid fa-address-card" style="font-size: 20px; color: #d4af37;"></i>
                <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; text-align: center;">Cartão Visita</span>
            </div>

             <!-- 7. Citação Bíblica (Adiciona este aqui!) -->
    <div class="tool-item" onclick="window.inserirFerramentaNoEditor('citacaobiblica')" 
         style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
        <i class="fa-solid fa-book-open" style="font-size: 20px; color: #94a3b8;"></i>
        <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; text-align: center;">Citação Bíblica</span>
    </div>

    <!-- 8. Webcard -->
    <div class="tool-item" onclick="window.inserirFerramentaNoEditor('webcard')" 
     style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
    <i class="fa-solid fa-tablet-screen-button" style="font-size: 20px; color: #8b5cf6;"></i>
    <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">WebCard</span>
</div>

 <!-- 8. Galeria -->
<div class="tool-item" onclick="window.inserirFerramentaNoEditor('galeria')" 
     style="display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 12px 5px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); transition: 0.2s;">
    <i class="fa-solid fa-panorama" style="font-size: 20px; color: #ec4899;"></i>
    <span style="font-size: 8.5px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Imagens</span>
</div>

            <!-- Placeholders para manter o alinhamento da grelha (Opcional) -->
            
            <div style="opacity: 0.1; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 5px; border: 1px dashed var(--border-color); border-radius: 8px;">
                <i class="fa-solid fa-ellipsis" style="font-size: 20px;"></i>
            </div>

        </div>
    </div>
</div>
