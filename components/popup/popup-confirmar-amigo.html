<!-- components/popup/popup-confirmar-amigo.html -->
<div id="popup-confirmar-amigo-overlay" class="popup-overlay" style="z-index: 10100;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #ef4444; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-user-slash"></i>
        </div>
        <h3 style="color: white; font-size: 16px; margin-bottom: 10px;">Remover Amigo?</h3>
        <p id="texto-confirmar-amigo" style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5;">
            Tens a certeza que desejas remover esta ligação de amizade?
        </p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-amigo-rem" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: 600;">Cancelar</button>
            <button id="btn-confirmar-amigo-rem" style="flex: 1; padding: 10px; background: #ef4444; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 700;">Sim, Remover</button>
        </div>
    </div>
</div>
