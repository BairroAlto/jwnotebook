<div id="popup-sumariar-form-overlay" class="popup-overlay" style="z-index: 10050;">
    <div class="popup-content" style="max-width: 450px; width: 95%; border-radius: 24px;">
        
        <!-- CABEÇALHO COM FECHO -->
        <div class="popup-header" style="padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <h3 style="font-size: 16px; font-weight: 800; color: #10b981; margin:0;">CONFIGURAR sumar<span style="color:#a855f7">IA</span>r</h3>
            <button class="btn-fechar-sumar" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:20px;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div style="padding: 25px; max-height: 75vh; overflow-y: auto;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                <button id="btn-sumar-tudo" class="btn-amt active" style="width:100%; height:45px; border-radius:12px;">RESUMIR TUDO</button>
                <button id="btn-sumar-apenas" class="btn-amt" style="width:100%; height:45px; border-radius:12px;">ESCOLHER BLOCOS</button>
            </div>
            <p id="status-selecao-sumar" style="font-size:10px; text-align:center; color:var(--text-muted); margin-top:-10px; margin-bottom:20px;">Toda a nota será processada.</p>

        <!-- SEÇÕES DE PERSONALIZAÇÃO -->
        <div style="display:flex; flex-direction:column; gap:20px;">
            <div>
                <label style="font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px; display:block;">Formato</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <div class="opt-card active" data-group="format" data-value="lista"><i class="fa-solid fa-list-ul"></i><span>Lista</span></div>
                    <div class="opt-card" data-group="format" data-value="paragrafo"><i class="fa-solid fa-align-left"></i><span>Parágrafo</span></div>
                </div>
            </div>

            <div>
                <label style="font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px; display:block;">Densidade</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
                    <div class="opt-card" data-group="size" data-value="pequeno"><span>Pequeno</span></div>
                    <div class="opt-card active" data-group="size" data-value="medio"><span>Médio</span></div>
                    <div class="opt-card" data-group="size" data-value="grande"><span>Grande</span></div>
                </div>
            </div>

            <div>
                <label style="font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:8px; display:block;">Estilo de Escrita</label>
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;">
                    <div class="opt-card active" data-group="style" data-value="normal"><span>Normal</span></div>
                    <div class="opt-card" data-group="style" data-value="historico"><span>Histórico</span></div>
                    <div class="opt-card" data-group="style" data-value="cientifico"><span>Científico</span></div>
                    <div class="opt-card" data-group="style" data-value="teocratico"><span>Teocrático</span></div>
                    <div class="opt-card" data-group="style" data-value="academico"><span>Académico</span></div>
                    <div class="opt-card" data-group="style" data-value="natural"><span>Natural</span></div>
                </div>
            </div>
        </div>

      <button id="btn-gerar-resumo-final" class="btn-xray-main" style="width:100%; margin-top:30px; background: linear-gradient(90deg, #10b981, #a855f7); border-radius:14px; height:55px;">
                GERAR RESUMO INTELIGENTE
            </button>
        </div>
    </div>
</div>

<style>
    .opt-card {
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
        padding: 12px 5px; border-radius: 12px; cursor: pointer; text-align: center;
        display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s;
    }
    .opt-card span { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
    .opt-card i { font-size: 14px; color: #64748b; }
    .opt-card.active { background: rgba(16, 185, 129, 0.1); border-color: #10b981; }
    .opt-card.active span { color: white; }
    .opt-card.active i { color: #10b981; }
</style>
