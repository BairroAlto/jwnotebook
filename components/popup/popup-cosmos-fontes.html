<div id="popup-cosmos-fontes-overlay" class="popup-overlay" style="z-index: 10100;">
    <div class="popup-content" style="max-width: 450px; width: 95%;">
        <div class="popup-header">
            <h3 id="titulo-fontes-cosmos">Adicionar Fontes</h3>
            <button id="btn-fechar-fontes-cosmos"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div style="padding: 15px 15px 0 15px;">
            <div class="sub-tabs">
                <button class="tab-f-cosmos active" data-target="tab-f-links">Links</button>
                <button class="tab-f-cosmos" data-target="tab-f-codex">Codex</button>
            </div>
        </div>

        <div style="padding: 20px; max-height: 60vh; overflow-y: auto; background: var(--bg-body);">
            <!-- ABA LINKS -->
            <div id="tab-f-links" class="tab-f-content">
                <label style="display:block; font-size:10px; color:var(--primary); font-weight:700; margin-bottom:5px; text-transform:uppercase;">Título da Coleção</label>
                <input type="text" id="f-link-titulo" placeholder="Ex: Vídeos de Referência..." style="width:100%; margin-bottom:15px; padding:10px; background:var(--bg-panel); border:1px solid var(--border-color); color:white; border-radius:6px;">
                
                <label style="display:block; font-size:10px; color:var(--primary); font-weight:700; margin-bottom:5px; text-transform:uppercase;">URLs (Hiperlinks)</label>
                <div id="container-inputs-urls"></div>
                
                <button id="btn-mais-url" style="background:transparent; border:1px dashed var(--primary); color:var(--primary); width:100%; padding:10px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:700; margin-top:5px;">
                    <i class="fa-solid fa-plus"></i> ADICIONAR OUTRA URL
                </button>
            </div>

            <!-- ABA CODEX -->
            <div id="tab-f-codex" class="tab-f-content" style="display:none;">
                <i class="fa-solid fa-book-journal-whills" style="font-size:40px; color:var(--primary); margin-bottom:15px; opacity:0.5;"></i>
                <p style="font-size:13px; color:var(--text-muted); margin-bottom:20px;">Utiliza o Explorador Codex para indexar parágrafos específicos diretamente no tema.</p>
                <button id="btn-abrir-explorador-f-codex" style="background:var(--primary); color:white; border:none; padding:12px 25px; border-radius:8px; font-weight:700; cursor:pointer;">
                    ABRIR EXPLORADOR CODEX
                </button>
            </div>
        </div>

        <div class="popup-footer" style="padding:15px; border-top:1px solid var(--border-color); text-align:right; display:flex; justify-content:flex-end; gap:10px;">
            <button id="btn-cancelar-f-cosmos" style="background:transparent; color:var(--text-muted); border:1px solid var(--border-color); padding:10px 20px; border-radius:6px; cursor:pointer;">Cancelar</button>
            <button id="btn-gravar-f-cosmos" style="background:var(--primary); color:white; border:none; padding:10px 25px; border-radius:6px; font-weight:700; cursor:pointer;">Gravar Fonte</button>
        </div>
    </div>
</div>

<!-- Popup Genérico de Confirmação para Fontes -->
<div id="popup-confirmar-rem-fonte-overlay" class="popup-overlay" style="z-index: 10200;">
    <div class="popup-content" style="max-width: 350px; text-align: center; padding: 25px;">
        <div style="color: #fbbf24; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3 id="rem-fonte-titulo" style="color: var(--text-main); font-size: 16px; margin-bottom: 10px;">Confirmar</h3>
        <p id="rem-fonte-msg" style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5;">Deseja realizar esta ação?</p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-rem-fonte" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: 600;">Cancelar</button>
            <button id="btn-confirmar-rem-fonte" style="flex: 1; padding: 10px; background: #ef4444; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 700;">Confirmar</button>
        </div>
    </div>
</div>
