<div id="popup-confirmar-vinculo-overlay" class="popup-overlay" style="z-index: 10001;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #ef4444; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-link-slash"></i>
        </div>
        <h3 style="color: var(--text-main); font-size: 16px; margin-bottom: 10px;">Remover Vínculo?</h3>
        <p id="msg-confirmar-vinculo" style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">
            Deseja remover a conexão com este tópico?
        </p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-vinculo" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 6px; cursor: pointer;">Cancelar</button>
            <button id="btn-confirmar-vinculo" style="flex: 1; padding: 10px; background: #ef4444; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 600;">Sim, Remover</button>
        </div>
    </div>
</div>
