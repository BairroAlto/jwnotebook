<div id="popup-imagens-overlay" class="popup-overlay" style="z-index: 10030;">
    <div class="popup-content" style="max-width: 380px; padding: 25px;">
        <h3 style="color: #ec4899; font-size: 16px; margin-bottom: 15px; font-weight: 800;">CONFIGURAR IMAGENS</h3>
        
        <div style="display: flex; flex-direction: column; gap: 12px;" id="container-inputs-imagens">
            <input type="text" class="input-img-url" placeholder="URL da Imagem 1 (https://...)">
            <input type="text" class="input-img-url" placeholder="URL da Imagem 2">
            <input type="text" class="input-img-url" placeholder="URL da Imagem 3">
        </div>

        <div style="margin-top: 20px;">
            <label style="display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; font-weight:800; margin-bottom:8px;">Dimensão das Imagens</label>
            <select id="select-dimensao-galeria" style="width:100%; padding:10px; background:var(--bg-body); border:1px solid var(--border-color); color:white; border-radius:8px;">
                <option value="pequenas">Pequenas</option>
                <option value="medias" selected>Médias</option>
                <option value="grandes">Grandes</option>
                <option value="gigantes">Gigantes</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button id="btn-cancelar-imagens" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px;">Cancelar</button>
            <button id="btn-confirmar-imagens" style="flex: 1; padding: 12px; background: #ec4899; border: none; color: white; border-radius: 8px; font-weight: 700;">Aplicar</button>
        </div>
    </div>
</div>
