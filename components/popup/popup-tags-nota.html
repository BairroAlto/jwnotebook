<!-- components/popup/popup-tags-nota.html -->
<div id="popup-tags-nota-overlay" class="popup-overlay" style="z-index: 10005;">
    <div class="popup-content" style="max-width: 450px; width: 95%;">
        <div class="popup-header">
            <h3>Tópicos da Nota</h3>
            <button id="btn-fechar-tags-nota"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div style="padding: 20px; min-height: 300px; max-height: 70vh; overflow-y: auto; background-color: var(--bg-body);">
            
            <div id="lista-vinc-topicos-nota" class="pill-container" style="margin-bottom: 20px;"></div>

            <div style="height: 1px; background: var(--border-color); margin: 20px 0;"></div>

            <div id="area-form-topicos-nota">
                <label style="display:block; font-size:10px; color:var(--primary); margin-bottom:8px; text-transform:uppercase; font-weight: 700;">Vincular Novo Tópico</label>
                
                <!-- PESQUISA PAI -->
                <div style="margin-bottom: 15px;">
                    <div style="position: relative;">
                        <input type="text" id="search-tags-nota-topico" placeholder="1. Escolher Tópico Pai..." style="width: 100%; padding: 12px; background: #1e293b; border: 1px solid var(--border-color); border-radius: 4px; color: white; outline: none;">
                        <!-- ADICIONADO: CONTENTOR DE RESULTADOS PAI -->
                        <div id="results-tags-nota-topico" class="tags-search-results" style="display: none;"></div>
                    </div>
                    <div id="selected-tags-nota-topico-display" style="margin-top:10px;"></div>
                </div>

                <!-- PESQUISA SUBTÓPICO -->
                <div id="section-tags-nota-subtopico" style="opacity: 0.3; pointer-events: none; transition: 0.3s;">
                    <div style="position: relative;">
                        <input type="text" id="search-tags-nota-subtopico" placeholder="2. Escolher Subtópico..." style="width: 100%; padding: 12px; background: #1e293b; border: 1px solid var(--border-color); border-radius: 4px; color: white; outline: none;">
                        <!-- ADICIONADO: CONTENTOR DE RESULTADOS SUBTÓPICO -->
                        <div id="results-tags-nota-subtopico" class="tags-search-results" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
