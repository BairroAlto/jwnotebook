<!-- components/popup/popup-browser.html -->
<div id="popup-browser-overlay" class="popup-overlay" style="z-index: 9993;">
    <div class="popup-content" style="width: 400px; max-width: 95%;">
        <div class="popup-header">
            <h3>Explorar Notas</h3>
            <button id="btn-fechar-browser"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <!-- NAVEGAÇÃO POR ABAS -->
        <div style="padding: 16px 16px 0 16px;">
            <div class="sub-tabs">
                <button class="tab-browser active" data-origem="Local">
                    <i class="fa-solid fa-house-user"></i> Local
                </button>
                <button class="tab-browser" data-origem="Share">
                    <i class="fa-solid fa-share-nodes"></i> Share
                </button>
            </div>
        </div>

        <div style="padding: 16px;">
            <p id="browser-label-info" style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase;">
                Seleciona uma nota Local
            </p>
            <div id="arvore-browser" style="background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 4px; padding: 10px; height: 300px; overflow-y: auto;">
                <!-- Lista de notas injetada aqui -->
            </div>
        </div>
    </div>
</div>
