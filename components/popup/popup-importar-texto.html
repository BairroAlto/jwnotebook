<div id="popup-importar-texto-overlay" class="popup-overlay" style="z-index: 10020;">
    <div class="popup-content importar-texto-content">
        <div class="popup-header">
            <h3><i class="fa-solid fa-file-import"></i> Importar Texto</h3>
            <button type="button" id="btn-fechar-importar-texto" aria-label="Fechar">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="importar-texto-body">
            <label class="importar-texto-label" for="importar-texto-separador">Ler cada frase por</label>
            <select id="importar-texto-separador" class="importar-texto-select">
                <option value="paragraph">Parágrafo</option>
                <option value="question">Ponto de interrogação (?)</option>

                <option value="period">Ponto final (.)</option>
                <option value="punctuation">Pontuação geral (?, !, ;, .)</option>
                <option value="ellipsis">Reticências (... ou …)</option>
                <option value="semicolon">Ponto e vírgula (;)</option>
                <option value="number">Número (1., 2), 3:)</option>
                <option value="close-parenthesis">Parêntesis — )</option>
                <option value="open-parenthesis">Parêntesis — (</option>
                <option disabled class="importar-texto-option-separator">────────────────────────</option>
                <option value="combo-question-parenthesis">Combo 1: ? e )</option>
                <option value="combo-paragraph-parenthesis">Combo 2: Parágrafo + )</option>
                <option value="combo-paragraph-question">Combo 3: Parágrafo + ?</option>
            </select>

            <label class="importar-texto-label" for="importar-texto-conteudo">Texto a importar</label>
            <textarea id="importar-texto-conteudo" class="importar-texto-input" rows="7" placeholder="Cola aqui o texto que queres transformar em caixas..."></textarea>

            <div class="importar-texto-preview-head">
                <div>
                    <span class="importar-texto-label">Pré-visualização</span>
                    <small>Confirma o tipo de cada caixa antes de importar.</small>
                </div>
                <div class="importar-texto-global-controls">
                    <select id="importar-texto-tipo-global" class="importar-texto-select importar-texto-global-select" aria-label="Tipo predefinido para todas as caixas">
                        <option value="questao">Questão</option>
                        <option value="subnota">Subnota</option>
                        <option value="raciocinio">Raciocínio</option>
                        <option value="cartaovisita">Cartão de visita</option>
                        <option value="contentor">Contentor</option>
                        <option value="firmamento">Firmamento</option>
                    </select>
                    <select id="importar-texto-destino-global" class="importar-texto-select importar-texto-global-select" aria-label="Destino predefinido do texto">
                        <option value="title">Título</option>
                        <option value="content">Conteúdo</option>
                    </select>
                </div>
            </div>

            <div id="importar-texto-preview" class="importar-texto-preview">
                <p class="importar-texto-vazio">Cola um texto para veres as caixas que serão criadas.</p>
            </div>

            <div id="importar-texto-estado" class="importar-texto-estado" role="status"></div>
        </div>

        <div class="importar-texto-actions">
            <button type="button" id="btn-cancelar-importar-texto" class="btn-cancelar">Cancelar</button>
            <button type="button" id="btn-confirmar-importar-texto" class="btn-confirmar-importar-texto">
                <i class="fa-solid fa-layer-group"></i> Criar caixas
            </button>
        </div>
    </div>
</div>
