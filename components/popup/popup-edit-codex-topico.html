<div id="popup-edit-codex-topico-overlay" class="popup-overlay" style="z-index: 10020;">
    <div class="popup-content" style="max-width: 400px; padding: 25px;">
        <h3 style="color: var(--primary); font-size: 16px; margin-bottom: 20px;">Editar Referência Codex</h3>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <input type="text" id="edit-codex-ref" placeholder="Sigla..." style="width:100%; padding:10px; background:var(--bg-body); border:1px solid var(--border-color); color:white; border-radius:6px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" id="edit-codex-ano" placeholder="Ano" style="width:100%; padding:10px; background:var(--bg-body); border:1px solid var(--border-color); color:white; border-radius:6px;">
                <input type="number" id="edit-codex-mes" placeholder="Mês" style="width:100%; padding:10px; background:var(--bg-body); border:1px solid var(--border-color); color:white; border-radius:6px;">
            </div>
            <input type="text" id="edit-codex-cap" placeholder="Capítulo" style="width:100%; padding:10px; background:var(--bg-body); border:1px solid var(--border-color); color:white; border-radius:6px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="text" id="edit-codex-pags" placeholder="Páginas" style="width:100%; padding:10px; background:var(--bg-body); border:1px solid var(--border-color); color:white; border-radius:6px;">
                <input type="text" id="edit-codex-pars" placeholder="Parágrafos" style="width:100%; padding:10px; background:var(--bg-body); border:1px solid var(--border-color); color:white; border-radius:6px;">
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button id="btn-cancelar-edit-codex" style="flex:1; padding:12px; background:transparent; border:1px solid var(--border-color); color:white; cursor:pointer;">Cancelar</button>
            <button id="btn-gravar-edit-codex" style="flex:1; padding:12px; background:var(--primary); border:none; color:white; font-weight:700; cursor:pointer;">Gravar</button>
        </div>
    </div>
</div>
