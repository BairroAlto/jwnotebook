<!-- Popup Criar Tema Cosmos -->
<div id="popup-tema-cosmos-overlay" class="popup-overlay" style="z-index: 9997;">
    <div class="popup-content" style="max-width: 450px; width: 95%;">
        <div class="popup-header">
            <h3>Novo Tema Cosmos</h3>
            <button id="btn-fechar-cosmos"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div style="padding: 20px; max-height: 75vh; overflow-y: auto;">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
                <button id="btn-abrir-criar-categoria" style="background: var(--bg-panel); border: 1px solid var(--primary); color: var(--primary); padding: 5px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: 600;">
                    <i class="fa-solid fa-folder-plus"></i> CRIAR CATEGORIA
                </button>
            </div>

            <div class="field-group" style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:5px; text-transform:uppercase;">Nome do Tema</label>
                <input type="text" id="cosmos-tema-nome" placeholder="Ex: Meditação, Finanças..." style="width:100%;">
            </div>

            <div class="field-group" style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:5px; text-transform:uppercase;">Descrição (Opcional)</label>
                <textarea id="cosmos-tema-desc" placeholder="Breve descrição..." style="width:100%; height:60px; resize:none;"></textarea>
            </div>

            <div class="field-group" style="margin-bottom: 20px;">
                <label style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:5px; text-transform:uppercase;">Categoria</label>
                <select id="cosmos-tema-categoria" style="width:100%; padding:10px; background:var(--bg-body); color:white; border:1px solid var(--border-color); border-radius:4px;">
                    <option value="">Nenhuma Categoria</option>
                </select>
            </div>

            <label style="display:block; font-size:11px; color:var(--text-muted); margin-bottom:10px; text-transform:uppercase;">Escolher Símbolo</label>
            <div id="cosmos-icon-selector" style="display: flex; flex-direction: column; gap: 15px; background: var(--bg-body); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);">
                <!-- Ícones serão injetados aqui pelo JS -->
            </div>
        </div>

       <div class="popup-footer" style="padding: 15px; border-top: 1px solid var(--border-color); text-align: right; display: flex; align-items: center; justify-content: space-between; gap: 10px;">
    <!-- NOVO BOTÃO OCULTAR (Inicia escondido) -->
    <button id="btn-ocultar-cosmos" style="display:none; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;">OCULTAR</button>
    
    <button id="btn-gravar-cosmos" style="background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-left: auto;">Criar Tema</button>
</div>
    </div>
</div>

<!-- Popup Criar Categoria -->
<div id="popup-categoria-cosmos-overlay" class="popup-overlay" style="z-index: 9998;">
    <div class="popup-content" style="max-width: 300px;">
        <div class="popup-header">
            <h3>Nova Categoria</h3>
            <button id="btn-cancelar-cat-x"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div style="padding: 20px;">
            <input type="text" id="cosmos-cat-nome" placeholder="Nome da categoria..." style="width:100%; margin-bottom:15px;">
            <button id="btn-confirmar-categoria" style="width:100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: 600; cursor: pointer;">Gravar Categoria</button>
        </div>
    </div>
</div>

<!-- Novo: Popup de Confirmação para o Puzzle -->
<div id="popup-confirmar-puzzle-overlay" class="popup-overlay" style="z-index: 10050;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div id="puzzle-confirm-icon" style="color: #ef4444; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3 id="puzzle-confirm-titulo" style="color: var(--text-main); font-size: 16px; margin-bottom: 10px;">Confirmar</h3>
        <p id="puzzle-confirm-msg" style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.4;">Deseja realizar esta ação?</p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-puzzle-confirm-cancelar" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: 600;">Cancelar</button>
            <button id="btn-puzzle-confirm-sim" style="flex: 1; padding: 10px; background: #ef4444; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: 600;">Eliminar</button>
        </div>
    </div>
</div>

<!-- Popup Criar/Editar Mica -->
<div id="popup-mica-overlay" class="popup-overlay" style="z-index: 10100;">
    <div class="popup-content" style="max-width: 400px; padding: 25px;">
        <h3 id="mica-popup-titulo" style="color: var(--primary); margin-bottom: 20px;">Nova Mica</h3>
        <input type="text" id="mica-input-titulo" placeholder="Título da Mica..." style="width:100%; margin-bottom:20px;">
        
        <label style="display:block; font-size:10px; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px;">Cor da Pasta</label>
        <div id="mica-cor-selector" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 25px;">
            <!-- Cores injetadas via JS -->
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-mica" style="flex:1; padding:12px; background:transparent; border:1px solid var(--border-color); color:white; border-radius:6px; cursor:pointer;">Cancelar</button>
            <button id="btn-gravar-mica" style="flex:1; padding:12px; background:var(--primary); border:none; color:white; font-weight:700; border-radius:6px; cursor:pointer;">Gravar Mica</button>
        </div>
    </div>
</div>

<!-- Popup Adicionar Referência (+Ref) -->
<div id="popup-mica-ref-overlay" class="popup-overlay" style="z-index: 10100;">
    <div class="popup-content" style="max-width: 450px; width: 95%; height: 70vh; display: flex; flex-direction: column;">
        <div class="popup-header">
            <h3>Adicionar à Mica</h3>
            <button onclick="document.getElementById('popup-mica-ref-overlay').classList.remove('active')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div style="padding: 15px;">
            <div class="sub-tabs">
                <button class="tab-mica-ref active" data-target="ref-caixas">Caixas</button>
                <button class="tab-mica-ref" data-target="ref-biblia">Bíblia</button>
            </div>
        </div>
        <div id="mica-ref-content" style="flex:1; overflow-y:auto; padding: 15px; background: var(--bg-body);">
            <!-- Conteúdo dinâmico das abas -->
        </div>
        <div class="popup-footer" style="padding:15px; border-top:1px solid var(--border-color); text-align:right;">
            <button id="btn-confirmar-ref-mica" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:6px; font-weight:700; cursor:pointer;">Confirmar Seleção</button>
        </div>
    </div>
</div>

<!-- Popup Lista de Âncoras -->
<div id="popup-ancora-lista-overlay" class="popup-overlay" style="z-index: 10200;">
    <div class="popup-content" style="max-width: 350px; width: 95%;">
        <div class="popup-header">
            <h3>Âncoras</h3>
            <div style="display: flex; gap: 15px; align-items: center;">
                <i class="fa-solid fa-pen" id="btn-edit-ancoras-toggle" style="cursor:pointer; font-size: 14px; color: var(--text-muted);"></i>
                <i class="fa-solid fa-plus" id="btn-nova-ancora-trigger" style="cursor:pointer; font-size: 16px; color: var(--primary);"></i>
                <button onclick="document.getElementById('popup-ancora-lista-overlay').classList.remove('active')"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>
        <div id="lista-ancoras-container" style="padding: 15px; max-height: 300px; overflow-y: auto; background: var(--bg-body);">
            <!-- Itens injetados via JS -->
        </div>
    </div>
</div>

<!-- Popup Criar/Editar Categoria Âncora -->
<div id="popup-ancora-form-overlay" class="popup-overlay" style="z-index: 10300;">
    <div class="popup-content" style="max-width: 300px; padding: 20px;">
        <h4 id="ancora-form-titulo" style="margin-bottom: 15px; font-size: 14px; color: var(--primary);">Nova Categoria</h4>
        <input type="text" id="input-nome-ancora" placeholder="Nome da categoria..." style="width: 100%; margin-bottom: 20px;">
        <div style="display: flex; gap: 10px;">
            <button onclick="document.getElementById('popup-ancora-form-overlay').classList.remove('active')" style="flex:1; background: transparent; border: 1px solid var(--border-color); color:white; padding: 10px; border-radius: 4px; cursor:pointer;">Cancelar</button>
            <button id="btn-gravar-ancora-final" style="flex:1; background: var(--primary); border: none; color:white; font-weight: 700; padding: 10px; border-radius: 4px; cursor:pointer;">Gravar</button>
        </div>
    </div>
</div>

<!-- Popup de Confirmação para Ocultar Tema -->
<div id="popup-confirmar-ocultar-cosmos" class="popup-overlay" style="z-index: 10050;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #ef4444; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3 style="color: white; font-size: 18px; margin-bottom: 10px;">Ocultar Tema?</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5;">
            Este tema deixará de estar visível. Poderás recuperá-lo no painel de reciclagem nos próximos 3 meses.
        </p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-ocultar-cosmos" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: 600;">
                Cancelar
            </button>
            <button id="btn-confirmar-ocultar-cosmos-final" style="flex: 1; padding: 12px; background: #ef4444; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 700;">
                Sim, Ocultar
            </button>
        </div>
    </div>
</div>
