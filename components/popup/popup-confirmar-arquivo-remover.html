<!-- components/popup/popup-confirmar-arquivo-remover.html -->
<div id="popup-confirmar-arquivo-remover" class="popup-overlay" style="z-index: 10010;">
    <div class="popup-content" style="max-width: 360px; text-align: center; padding: 25px;">
        <div style="color: #6366f1; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-box-archive"></i>
        </div>
        <h3 style="color: white; font-size: 17px; margin-bottom: 8px; font-weight: 800;">GESTÃO DE ARQUIVO</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5; padding: 0 10px;">
            Como desejas remover este bloco?
        </p>
        
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <!-- OPÇÃO 1: APENAS ARQUIVO -->
            <button id="btn-rem-apenas-arquivo" style="padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s;" 
                    onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">
                <i class="fa-solid fa-folder-minus" style="margin-right: 8px; opacity: 0.7;"></i> Tirar apenas deste local
            </button>

            <!-- OPÇÃO 2: NOTA TOTAL -->
            <button id="btn-rem-nota-total" style="padding: 14px; background: #ef4444; border: none; color: white; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s;"
                    onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
                <i class="fa-solid fa-trash-can" style="margin-right: 8px;"></i> Ocultar da Nota (Geral)
            </button>

            <!-- CANCELAR -->
            <button onclick="document.getElementById('popup-confirmar-arquivo-remover').classList.remove('active')" 
                    style="margin-top: 10px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
                Cancelar
            </button>
        </div>
    </div>
</div>
