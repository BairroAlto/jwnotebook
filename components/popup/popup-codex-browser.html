<div id="popup-codex-browser-overlay" class="popup-overlay" style="z-index: 10150;">
    <div class="popup-content" style="max-width: 600px; height: 80vh; display: flex; flex-direction: column;">
        <div class="popup-header">
            <h3>Explorador Codex</h3>
            <button id="btn-fechar-codex-browser"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div id="codex-navegacao-caminho" style="padding: 10px 20px; font-size: 11px; color: var(--text-muted); background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-color);">
            Repositório > Selecionar Categoria
        </div>

        <div id="codex-browser-lista" style="flex: 1; overflow-y: auto; padding: 10px;">
            <!-- Navegação injetada via JS (Categorias > Anos > Ficheiros > Artigos > Parágrafos) -->
        </div>

        <div class="popup-footer" style="padding: 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
            <div id="codex-selecionados-info" style="font-size: 12px; color: var(--primary);">0 parágrafos selecionados</div>
            <button id="btn-confirmar-codex" class="btn-primary" style="padding: 8px 20px; border-radius: 4px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer;">Confirmar Escolha</button>
        </div>
    </div>
</div>
