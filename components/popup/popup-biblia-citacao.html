<!-- components/popup/popup-biblia-citacao.html -->
<div id="popup-biblia-citacao-overlay" class="popup-overlay" style="z-index: 10020;">
    <div class="popup-content" style="max-width: 500px; height: 80vh; display: flex; flex-direction: column;">
        <div class="popup-header">
            <h3>Selecionar Escrituras</h3>
            <button id="btn-fechar-biblia-citacao"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div id="biblia-citacao-navegacao" style="padding: 10px 20px; font-size: 11px; color: var(--text-muted); background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-color);">
            Bíblia > Selecionar Livro
        </div>

        <div id="biblia-citacao-corpo" style="flex: 1; overflow-y: auto; padding: 15px;">
            <!-- Grelha de Livros / Capítulos / Versículos injetada aqui -->
        </div>

        <div class="popup-footer" style="padding: 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
            <div id="info-selecao-biblia" style="font-size: 12px; color: var(--primary);">0 versículos selecionados</div>
            <button id="btn-confirmar-selecao-biblia" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer;">Confirmar</button>
        </div>
    </div>
</div>
