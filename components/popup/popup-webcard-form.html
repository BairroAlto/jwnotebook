<div id="popup-webcard-overlay" class="popup-overlay" style="z-index: 10025;">
    <div class="popup-content" style="max-width: 400px; padding: 25px;">
        <h3 style="color: #8b5cf6; font-size: 16px; margin-bottom: 15px; font-weight: 800;">CONFIGURAR WEBCARD</h3>
        <p style="font-size: 11px; color: var(--text-muted); margin-bottom: 20px;">Insere até 5 links para gerar os cartões visuais.</p>
        
        <div id="container-inputs-webcard" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" class="input-url-web" placeholder="Link 1 (https://...)" style="width:100%;">
            <input type="text" class="input-url-web" placeholder="Link 2" style="width:100%;">
            <input type="text" class="input-url-web" placeholder="Link 3" style="width:100%;">
            <input type="text" class="input-url-web" placeholder="Link 4" style="width:100%;">
            <input type="text" class="input-url-web" placeholder="Link 5" style="width:100%;">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button id="btn-cancelar-webcard" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer;">Cancelar</button>
            <button id="btn-confirmar-webcard" style="flex: 1; padding: 12px; background: #8b5cf6; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 700;">Gerar Cards</button>
        </div>
    </div>
</div>
