<!-- Popup: Sucesso no Convite -->
<div id="popup-sucesso-convite-overlay" class="popup-overlay" style="z-index: 10010;">
    <div class="popup-content" style="max-width: 300px; text-align: center; padding: 25px;">
        <div style="color: #6366f1; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-paper-plane"></i>
        </div>
        <h3 style="color: white; font-size: 16px; margin-bottom: 8px;">Convite Enviado!</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 20px;">O teu amigo recebeu a notificação para editar esta nota.</p>
        <button onclick="document.getElementById('popup-sucesso-convite-overlay').classList.remove('active')" 
                style="width: 100%; padding: 10px; background: var(--primary); border: none; color: white; border-radius: 6px; font-weight: 700; cursor: pointer;">OK</button>
    </div>
</div>

<!-- Popup: Confirmar Remoção de Colaborador -->
<div id="popup-confirmar-remocao-colab-overlay" class="popup-overlay" style="z-index: 10010;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #ef4444; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-user-minus"></i>
        </div>
        <h3 style="color: white; font-size: 16px; margin-bottom: 10px;">Remover Acesso?</h3>
        <p id="texto-confirmar-remocao-colab" style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.4;">
            Tens a certeza que desejas retirar a permissão de edição a este utilizador?
        </p>
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-remocao-colab" style="flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; cursor: pointer;">Cancelar</button>
            <button id="btn-confirmar-remocao-colab" style="flex: 1; padding: 10px; background: #ef4444; border: none; color: white; border-radius: 6px; font-weight: 700; cursor: pointer;">Remover</button>
        </div>
    </div>
</div>
