<!-- components/popup/popup-confirmar-blackbox.html -->
<div id="popup-confirmar-blackbox-overlay" class="popup-overlay" style="z-index: 11000;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #ef4444; font-size: 45px; margin-bottom: 15px;">
            <i class="fa-solid fa-skull-crossbones"></i>
        </div>
        <h3 style="color: white; font-size: 18px; margin-bottom: 10px;">Remoção Definitiva</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5;">
            Tens a certeza? Este item será movido para o arquivo morto e <b>eliminado permanentemente</b> da tua lista.
        </p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-blackbox" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: 600;">
                Cancelar
            </button>
            <button id="btn-confirmar-blackbox" style="flex: 1; padding: 12px; background: #ef4444; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 700;">
                Sim, Eliminar
            </button>
        </div>
    </div>
</div>
