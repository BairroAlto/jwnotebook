<!-- components/local/popups-gestao.html -->

<!-- 1. MENU DE GESTÃO PRINCIPAL (PASTA OU NOTA) -->
<div id="popup-gestao-item-overlay" class="popup-overlay" style="z-index: 10100;">
    <div class="popup-content" style="max-width: 380px; width: 95%;">
        <div class="popup-header">
            <h3 id="gestao-item-titulo">Gerir Item</h3>
            <button onclick="document.getElementById('popup-gestao-item-overlay').classList.remove('active')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div style="padding: 20px; display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">Nome do Item</label>
                <input type="text" id="input-gestao-nome" style="width: 100%; margin-top: 8px; padding: 12px; background: var(--bg-body); border: 1px solid var(--border-color); color: white; border-radius: 8px; outline: none; font-size: 14px;">
            </div>

         <div id="seccao-icones-pasta" style="display: none;">
    <label style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px;">Ícone da Pasta</label>
    
    <!-- GRELHA DE ÍCONES ATUALIZADA -->
    <div id="grid-icones-pasta" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 12px; max-height: 150px; overflow-y: auto; padding: 5px; background: rgba(0,0,0,0.1); border-radius: 8px;">
        <!-- Originais -->
        <i class="fa-solid fa-folder icon-opt" data-icon="folder" title="Padrão"></i>
        <i class="fa-solid fa-folder-minus icon-opt" data-icon="folder-minus"></i>
        <i class="fa-solid fa-folder-plus icon-opt" data-icon="folder-plus"></i>
        <i class="fa-solid fa-folder-open icon-opt" data-icon="folder-open"></i>
        <i class="fa-solid fa-globe icon-opt" data-icon="globe"></i>
        
        <!-- Novos Pedidos -->
        <i class="fa-solid fa-lines-leaning icon-opt" data-icon="lines-leaning"></i>
        <i class="fa-solid fa-spaghetti-monster-flying icon-opt" data-icon="spaghetti-monster-flying"></i>
        <i class="fa-solid fa-bolt-lightning icon-opt" data-icon="bolt-lightning"></i>
        <i class="fa-brands fa-searchengin icon-opt" data-icon="searchengin"></i>
        <i class="fa-solid fa-magnifying-glass-chart icon-opt" data-icon="magnifying-glass-chart"></i>
        <i class="fa-brands fa-chrome icon-opt" data-icon="chrome"></i>
        <i class="fa-solid fa-graduation-cap icon-opt" data-icon="graduation-cap"></i>
        <i class="fa-brands fa-buffer icon-opt" data-icon="buffer"></i>
    </div>
</div>

            <!-- GRELHA DE 4 COLUNAS -->
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
                <button class="btn-gestao-acao" id="btn-gestao-mover">
                    <i class="fa-solid fa-folder-tree"></i> <span style="font-size: 9px;">Mover</span>
                </button>
                <button class="btn-gestao-acao" id="btn-gestao-ordenar">
                    <i class="fa-solid fa-sort"></i> <span style="font-size: 9px;">Ordem</span>
                </button>
                <button class="btn-gestao-acao" id="btn-gestao-pin">
                    <i class="fa-solid fa-thumbtack"></i> <span style="font-size: 9px;">Pin</span>
                </button>
                <!-- BOTÃO TOP COM ID CORRETO -->
                <button class="btn-gestao-acao" id="btn-gestao-top">
                    <i class="fa-solid fa-up-long"></i> <span style="font-size: 9px;">TOP</span>
                </button>
            </div>
        </div>

        <div class="popup-footer" style="padding: 15px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; gap: 10px; align-items: center;">
            <button id="btn-gestao-ocultar" style="background: transparent; border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-eye-slash"></i> Ocultar
            </button>
            <button id="btn-salvar-gestao-item" style="flex: 1; background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer;">
                Gravar Alterações
            </button>
        </div>
    </div>
</div>

<!-- 2. POPUP ESCOLHER PASTA DE DESTINO (MOVER) -->
<div id="popup-mover-item-overlay" class="popup-overlay" style="z-index: 10110;">
    <div class="popup-content" style="max-width: 400px; width: 95%;">
        <div class="popup-header">
            <h3>Mover para...</h3>
            <button onclick="document.getElementById('popup-mover-item-overlay').classList.remove('active')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div style="padding: 15px;">
            <div id="arvore-mover-local" style="background: var(--bg-body); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; height: 250px; overflow-y: auto;">
                <!-- Árvore injetada via local-tree-mover.js -->
            </div>
            <div style="margin-top: 15px; text-align: right; font-size: 11px; color: var(--text-muted);">
                Destino: <b id="nome-pasta-selecionada" style="color: var(--primary);">LOCAL (RAIZ)</b>
            </div>
        </div>
        <div class="popup-footer" style="padding: 15px; border-top: 1px solid var(--border-color); text-align: right;">
            <button id="btn-confirmar-movimentacao" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; opacity: 0.5;" disabled>
                Mover Agora
            </button>
        </div>
    </div>
</div>

<!-- 3. POPUP DE ORDENAÇÃO (SETAS CIMA/BAIXO) -->
<div id="popup-ordenar-itens-overlay" class="popup-overlay" style="z-index: 10120;">
    <div class="popup-content" style="max-width: 350px; width: 90%;">
        <div class="popup-header">
            <h3>Alterar Ordem</h3>
            <button onclick="document.getElementById('popup-ordenar-itens-overlay').classList.remove('active')">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div id="lista-reordenar-container" style="padding: 15px; max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: var(--bg-body);">
            <!-- Itens injetados via local-order-manager.js -->
        </div>
    </div>
</div>



<!-- APAGA os dois blocos marcados como "4." e substitui por este único: -->
<div id="popup-confirmar-ocultar-item" class="popup-overlay" style="z-index: 10200;">
    <div class="popup-content" style="max-width: 320px; text-align: center; padding: 25px;">
        <div style="color: #ef4444; font-size: 40px; margin-bottom: 15px;">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3 style="color: white; font-size: 18px; margin-bottom: 10px;">Confirmar Ocultação?</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px; line-height: 1.5;">
            Esta nota deixará de estar visível. Poderás recuperá-la no painel de reciclagem nos próximos 3 meses.
        </p>
        
        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-ocultar-final" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: 600;">
                Cancelar
            </button>
            <button id="btn-confirmar-ocultar-final" style="flex: 1; padding: 12px; background: #ef4444; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 700;">
                Sim, Ocultar
            </button>
        </div>
    </div>
</div>

<style>
    /* Estilo dos botões de ação do menu principal */
   .btn-gestao-acao {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        color: white;
        padding: 12px 5px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 600;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        transition: 0.2s;
    }
    .btn-gestao-acao i { font-size: 16px; opacity: 0.7; }
    .btn-gestao-acao:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--primary); }
    .btn-gestao-acao.pin-ativo { background: var(--primary) !important; color: white; border-color: var(--primary); }

    /* Opções de Ícones na Grelha */
    .icon-opt { 
        cursor: pointer; 
        transition: 0.2s; 
        padding: 10px; 
        font-size: 18px; 
        color: var(--text-muted); 
        text-align: center;
        border-radius: 6px;
    }
    .icon-opt:hover { color: white; background: rgba(255,255,255,0.05); }
    .icon-opt.active { 
        color: var(--primary); 
        background: rgba(99, 102, 241, 0.1);
        transform: scale(1.1); 
        filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.4)); 
    }

    #btn-gestao-ocultar:hover { background: rgba(239, 68, 68, 0.05); border-color: #ef4444; }
    .tree-item-pasta-select { transition: 0.2s; border: 1px solid transparent; margin-bottom: 2px; }
    .tree-item-pasta-select:hover { background: rgba(255,255,255,0.03); }
</style>
