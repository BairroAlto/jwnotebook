<!-- components/direita/menu.html -->

<!-- Controle de Alternância Principal (EYE vs BRAIN) -->
<div class="segmented-control">
    <button id="btn-eye" class="active" onclick="window.switchPanel('eye')">
        <i class="fa-solid fa-eye"></i> EYE
    </button>
    <button id="btn-brain" onclick="window.switchPanel('brain')">
        <i class="fa-solid fa-brain"></i> BRAIN
    </button>
    <!-- NOVO: X-SAT -->
    <button id="btn-xsat" onclick="window.switchPanel('xsat')">
        <i class="fa-solid fa-satellite"></i> X-SAT
    </button>
</div>


<!-- ========================================================== -->
<!-- PAINEL EYE (Inteligência da Nota Atual)                   -->
<!-- ========================================================== -->
<div id="panel-eye" class="tab-content active">
    
    <!-- Navegação Minimalista por Ícones -->
    <div class="eye-nav-minimal" id="sub-tabs-eye">
        <i class="fa-solid fa-list-ul active" id="btn-tab-indice" 
           onclick="window.switchEyeTab('indice')" title="&#205;ndice (GPS)" aria-label="&#205;ndice (GPS)"></i>
        
        <i class="fa-solid fa-book-open-reader" id="btn-tab-textos" 
           onclick="window.switchEyeTab('textos')" title="Textos B&#237;blicos" aria-label="Textos B&#237;blicos"></i>
        
        <i class="fa-solid fa-anchor" id="btn-tab-ancora" 
           onclick="window.switchEyeTab('ancora')" title="Temas Ancorados (Cosmos)" aria-label="Temas Ancorados (Cosmos)"></i>
        
        <i class="fa-solid fa-book-bookmark" id="btn-tab-fontes" 
           onclick="window.switchEyeTab('fontes')" title="Resumo de Fontes" aria-label="Resumo de Fontes"></i>
        
       <i class="fa-solid fa-box-archive" id="btn-tab-caixas" 
   onclick="window.switchEyeTab('caixas')" 
   title="Caixas Associadas" aria-label="Caixas Associadas" 
   style="display: none;"></i>
    </div>

    <!-- Área de Exibição de Conteúdo (Com Scroll Independente) -->
    <div class="eye-scroll-area">
        <!-- 1. Índice Dinâmico -->
        <div id="indice-nota-container" class="eye-content"></div>
        
        <!-- 2. Detetor de Textos Bíblicos -->
        <div id="textos-container" class="eye-content" style="display:none;"></div> 

        <!-- 3. Cruzamento de Âncoras e Cosmos -->
      <div id="ancora-nota-container" class="eye-content" style="display:none; flex-direction: column;">
</div>

        <!-- 4. Resumo Global de Fontes (Links e Codex) -->
        <div id="fontes-nota-container" class="eye-content" style="display:none;"></div>

        <!-- 5. Ferramentas de Outras Notas Ligadas -->
        <div id="caixas-associadas-container" class="eye-content" style="display:none;"></div>
    </div>
</div>


<!-- ========================================================== -->
<!-- PAINEL BRAIN (Conexões Globais e Cosmos)                   -->
<!-- ========================================================== -->
<div id="panel-brain" class="tab-content">
    
    <!-- Navegação Secundária do Brain -->
    <!-- Nota: Esta div é ocultada via JS quando um tema do Cosmos é aberto -->
    <div class="sub-tabs group-brain" id="sub-tabs-brain">
        <button id="btn-brain-puzzle" class="active">
            <i class="fa-solid fa-puzzle-piece"></i> Puzzle
        </button>
        <button id="btn-brain-dossie">
            <i class="fa-regular fa-folder-open"></i> Dossiê
        </button>
        
        <!-- Abas contextuais para Tópicos -->
        <button id="btn-brain-fontes" style="display: none;" onclick="window.trocarAbaSubtopico('fontes')">
            <i class="fa-solid fa-book-bookmark"></i> Fontes
        </button>
        <button id="btn-brain-cita" style="display: none;" onclick="window.trocarAbaSubtopico('cita')">
            <i class="fa-solid fa-quote-left"></i> Cita
        </button>
    </div>
    
    <!-- Área onde o Orquestrador (cosmos-brain.js) injeta o Header Fixo e o Conteúdo -->
    <div id="brain-resultado-pesquisa" class="brain-scroll-area">
        <!-- Injetado dinamicamente: Header fixo + Conteúdo do Cosmos/Puzzle/Dossiê -->
    </div>
</div>

<!-- ========================================================== -->
<!-- PAINEL X-SAT (Sincronização por Satélite)                  -->
<!-- ========================================================== -->
<div id="panel-xsat" class="tab-content">
    
    <!-- Barra de Números (Canais) -->
    <div class="xsat-num-nav" id="xsat-num-nav">
        <button class="xsat-num" data-num="1">1</button>
        <button class="xsat-num" data-num="2">2</button>
        <button class="xsat-num" data-num="3">3</button>
        <button class="xsat-num" data-num="4">4</button>
        <button class="xsat-num" data-num="5">5</button>
      <button class="xsat-num" data-num="6" style="border-color: #10b981; color: #10b981;">
    <i class="fa-solid fa-robot"></i> <!-- Ícone claro para o botão -->
</button>

    </div>

    <!-- Barra de Sub-Símbolos (Aparece ao clicar num número) -->
    <!-- MANTEMOS A CLASSE sub-tabs PARA HERDAR O ESTILO BRANCO QUE PEDISTE -->
    <div class="sub-tabs" id="xsat-sub-nav" style="display: none; justify-content: space-around; padding: 10px 16px;">
        <button id="btn-xsat-pub" title="Publicações"><i class="fa-solid fa-file-invoice"></i></button>
        <button id="btn-xsat-liv" title="Livros"><i class="fa-solid fa-book"></i></button>
        <button id="btn-xsat-vid" title="Multimédia"><i class="fa-solid fa-clapperboard"></i></button>
        <button id="btn-xsat-set" title="Definições"><i class="fa-solid fa-car-battery"></i></button>
    </div>

    <!-- Área de Conteúdo -->
    <div id="xsat-display-content" style="flex: 1; overflow-y: auto; padding: 20px;">
        <p style="text-align:center; color:gray; font-size:12px; opacity:0.5; margin-top:50px;">
            <i class="fa-solid fa-satellite-dish" style="font-size:30px; margin-bottom:10px; display:block;"></i>
            Selecione um canal de satélite
        </p>
    </div>
</div>
