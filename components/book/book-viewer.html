<div id="book-loading" class="book-loading" style="display:none;">
    <div class="spinner"></div>
    <p>A abrir nota...</p>
</div>

<div id="book-container" class="book-container" style="display:none;">
    <div class="book-toolbar" id="book-toolbar">
        <button id="book-copy" title="Copiar texto da nota"><i class="fa-regular fa-copy"></i></button>
        <button id="book-pdf" title="Baixar PDF"><i class="fa-regular fa-file-pdf"></i></button>
        <button id="book-refresh" title="Refresh da nota"><i class="fa-solid fa-rotate-right"></i></button>
        <button id="book-read" title="Ler em voz alta"><i class="fa-solid fa-volume-high"></i></button>
        <button id="book-speaker" title="Orador"><i class="fa-solid fa-person-chalkboard"></i></button>
        <button id="book-games" class="book-games-chip" title="Jogos">
            <i class="fa-solid fa-gamepad"></i>
            <span id="book-games-score">0</span>
        </button>
        <button id="book-satellite" title="Parabólica"><i class="fa-solid fa-satellite-dish"></i></button>
        <button id="book-ai" title="BookAI"><i class="fa-brands fa-mailchimp"></i></button>
    </div>
    <header class="book-note-head">
        <h1 id="book-title">Sem título</h1>
        <div id="book-info">Visualização</div>
    </header>
    <div id="book-feed" class="book-feed"></div>
</div>

<div id="book-placeholder" class="book-placeholder">
    <i class="fa-solid fa-book-open-reader"></i>
    <p>Seleciona uma nota para visualizar.</p>
</div>
