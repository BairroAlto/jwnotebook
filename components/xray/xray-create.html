<!-- components/xray/xray-create.html -->
<div id="popup-criar-xray" class="popup-overlay" style="z-index: 6000;">
    <div class="popup-content" style="max-width: 400px; width: 90%; border-radius: 28px; padding: 30px; text-align: center;">
        
        <div style="background: rgba(99, 102, 241, 0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
            <i class="fa-solid fa-microscope" style="color: var(--xray-primary); font-size: 24px;"></i>
        </div>

        <h3 style="font-size: 18px; margin-bottom: 10px; font-weight: 800;">Nova Investigação</h3>
        <p style="font-size: 12px; color: #94a3b8; margin-bottom: 25px;">Define um título para o teu novo laboratório de análise.</p>

        <input type="text" id="input-nome-xray-novo" placeholder="Ex: Estudo sobre a Paciência..." 
               style="width: 100%; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; color: white; outline: none; font-size: 14px; text-align: center; margin-bottom: 25px;">

        <div style="display: flex; gap: 10px;">
            <button id="btn-cancelar-xray-novo" style="flex: 1; padding: 15px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; border-radius: 14px; font-weight: 700; cursor: pointer;">
                CANCELAR
            </button>
            <button id="btn-confirmar-xray-novo" class="btn-xray-main" style="flex: 2; height: 50px;">
                CRIAR X-RAY
            </button>
        </div>
    </div>
</div>
