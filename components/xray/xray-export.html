<!-- components/xray/xray-export.html -->
<div id="popup-export-xray" class="popup-overlay" style="z-index: 5100;">
    <div class="popup-content" style="max-width: 440px; width: 95%; border-radius: 28px;">
        
        <div class="popup-header" style="padding: 25px 25px 10px 25px; border: none;">
            <h3 style="font-size: 18px; letter-spacing: -0.5px;">Exportar Manuscrito</h3>
            <button id="btn-fechar-export" style="background: rgba(255,255,255,0.05); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-xmark" style="font-size: 14px;"></i>
            </button>
        </div>

        <!-- ABAS COM DESIGN CORRIGIDO -->
        <div class="settings-tabs-container">
            <button class="tab-export-btn active" data-origem="Local">
                <i class="fa-solid fa-vault"></i> O Meu Cofre
            </button>
            <button class="tab-export-btn" data-origem="Share">
                <i class="fa-solid fa-share-nodes"></i> Partilhadas
            </button>
        </div>

        <div style="padding: 0 25px 25px 25px;">
            <!-- PESQUISA RÁPIDA -->
            <div style="position: relative; margin-bottom: 15px;">
                <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 12px;"></i>
                <input type="text" id="search-export-note" placeholder="Procurar pasta ou nota..." 
                       style="width: 100%; padding: 12px 15px 12px 40px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; color: white; font-size: 13px; outline: none;">
            </div>

            <!-- CONTENTOR DA ÁRVORE -->
            <div id="arvore-export-xray" class="xray-tree-view">
                <!-- Injetado via JS -->
            </div>

            <!-- BOTÃO DE AÇÃO -->
            <div id="export-action-footer" style="margin-top: 20px; display: none; animation: fadeIn 0.3s ease;">
                <button id="btn-executar-export" class="btn-xray-main" style="width: 100%; background: #22c55e; height: 55px; border-radius: 16px;">
                    <i class="fa-solid fa-file-export"></i> CONVERTÊR E ENVIAR
                </button>
                <p id="txt-nota-selecionada" style="font-size: 10px; color: #4ade80; margin-top: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px;"></p>
            </div>
        </div>
    </div>
</div>
