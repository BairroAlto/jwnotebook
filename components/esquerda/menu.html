<!-- components/esquerda/menu.html -->

<!-- 1. BOTÕES DE NAVEGAÇÃO DO TOPO (Abas principais) -->
<div class="left-buttons" id="left-buttons">
    <button class="active">Local</button>
    <button>Share</button>
    <button>Pins</button>
    <button>Lists</button>
</div>

<div style="flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden;">
    
    <!-- ========================================================== -->
    <!-- NAVEGAÇÃO DA ABA "LOCAL"                                   -->
    <!-- ========================================================== -->
    <div id="nav-pastas" style="display: flex; flex-shrink: 0; padding: 10px 15px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border-color); align-items: center; justify-content: space-between; color: var(--text-muted); min-height: 42px;">
        
        <!-- Retroceder em pastas -->
        <div id="nav-back-click" style="display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; overflow: hidden;">
            <i class="fa-solid fa-arrow-left" id="nav-icon-voltar" style="display: none; font-size: 12px; color: var(--primary);"></i> 
            <span id="nav-pasta-nome" style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted);">Local</span>
        </div>

        <!-- GRUPO DE ACÇÕES (EDITAR + NOVO) -->
        <div style="display: flex; align-items: center; gap: 12px;">
            <!-- NOVO: ÍCONE DE EDITAR (Lápis) -->
            <i class="fa-solid fa-pen-to-square" id="btn-editar-local-toggle" 
               style="cursor:pointer; font-size: 14px; color: var(--text-muted); transition: 0.2s;" 
               title="Gerir Pastas e Notas"></i>

            <!-- Botão Criar Nota/Pasta -->
            <button id="btn-add-novo-inline" title="Criar Novo" style="background: var(--primary); color: white; border: none; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;">
                <i class="fa-solid fa-plus" style="font-size: 12px;"></i>
            </button>
        </div>
    </div>


    <!-- ========================================================== -->
    <!-- NAVEGAÇÃO DA ABA "SHARE" (Vermelha)                        -->
    <!-- ========================================================== -->
<div id="nav-share" style="display: none; flex-shrink: 0; padding: 10px 15px; background: rgba(239, 68, 68, 0.1); border-bottom: 1px solid rgba(239, 68, 68, 0.2); align-items: center; justify-content: space-between; color: #fca5a5; min-height: 42px;">
    
    <div id="nav-back-share-click" style="display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; overflow: hidden;">
        <i class="fa-solid fa-arrow-left" id="nav-icon-voltar-share" style="display: none; font-size: 12px; color: #ef4444;"></i> 
        <span id="nav-share-nome" style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Share</span>
    </div>

    <!-- GRUPO DE ACÇÕES DO SHARE -->
    <div style="display: flex; align-items: center; gap: 12px;">
        <!-- BOTÃO DE EDIÇÃO (LÁPIS) -->
        <i class="fa-solid fa-pen-to-square" id="btn-editar-share-toggle" 
           style="cursor:pointer; font-size: 14px; color: #fca5a5; opacity: 0.6; transition: 0.2s;" 
           title="Gerir Itens Partilhados"></i>

        <button id="btn-add-share" title="Adicionar Partilha" style="background: #ef4444; color: white; border: none; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; flex-shrink: 0;">
            <i class="fa-solid fa-plus" style="font-size: 12px;"></i>
        </button>
    </div>
</div>


    <!-- ========================================================== -->
    <!-- CONTENTORES DE LISTAS DINÂMICAS                            -->
    <!-- ========================================================== -->
    
    <!-- Lista Local (Notas e Pastas do utilizador) -->
    <div id="lista-local" style="padding: 10px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;">
        <!-- Injetado via ler-local.js -->
    </div>

    <!-- Lista Share (Notas partilhadas) -->
    <div id="lista-share" style="display: none; padding: 10px; flex: 1; overflow-y: auto; flex-direction: column; gap: 4px;">
        <!-- Injetado via ler-share.js -->
    </div>
    
    <!-- FAIXA DE CABEÇALHO PINS -->
<div id="nav-pins" style="display: none; flex-shrink: 0; padding: 10px 15px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--border-color); align-items: center; justify-content: space-between; color: var(--text-muted); min-height: 42px;">
    <span style="font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px;">Pins</span>
    
    <!-- Lápis de Edição -->
    <i class="fa-solid fa-pen-to-square" id="btn-editar-pins-toggle" 
       style="cursor:pointer; font-size: 14px; color: var(--text-muted); opacity: 0.4; transition: 0.2s;" 
       title="Gerir Pins"></i>
</div>

     <!-- 3. AQUI: ADICIONA A LISTA DE PINS -->
    <div id="lista-pins" style="display: none; padding: 10px; flex: 1; overflow-y: auto; flex-direction: column; gap: 4px;">
        <!-- Os atalhos serão injetados aqui pelo ler-pins.js -->
    </div>

    <!-- Lista Lists (Bíblia, Tópicos, etc.) -->
    <div id="lista-lists" style="display: none; padding: 15px 10px; flex: 1; overflow-y: auto; flex-direction: column; gap: 4px;">
        
        <div class="menu-item-list" id="menu-list-topicos">
            <i class="fa-solid fa-layer-group" style="color: #818cf8;"></i> Tópicos
        </div>
        <div class="menu-item-list" id="menu-list-destaques">
            <i class="fa-solid fa-palette" style="color: #fbbf24;"></i> Destaques
        </div>
        
        <div class="menu-separador-list"></div>
        
        <div class="menu-item-list" id="menu-list-biblia">
            <i class="fa-solid fa-book-open" style="color: #e879f9;"></i> Bíblia
        </div>
        <div class="menu-item-list" id="menu-list-textos-biblicos">
            <i class="fa-solid fa-scroll" style="color: #8b5cf6;"></i> Textos Bíblicos
        </div>
        <div class="menu-item-list" id="menu-list-marcadores">
            <i class="fa-solid fa-bookmark" style="color: #ef4444;"></i> Marcadores
        </div>
        
        <div class="menu-separador-list"></div>
        
        <div class="menu-item-list" id="menu-list-livros">
            <i class="fa-solid fa-book" style="color: #60a5fa;"></i> Livros
        </div>
        
        <div class="menu-separador-list"></div>
        
        <div class="menu-item-list" id="menu-list-cosmos">
            <i class="fa-solid fa-meteor" style="color: #d49d06;"></i> Cosmos
        </div>
    </div>

</div>
