<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>notABook X</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/pw/AP1GczNbOBxcAwWmdQfM23rP7EAZINaQRQFX53uMo14hPhWvC3lsPy1inv3b42P5T2iFJ8Ot-bsLFUcOb0G4tVevedv1jtFxTlzGHyc00ddx94QViaji6vp0KuRcw1eC_WbddVVCPidHPoCJLZuwNdbr02ZC=w192-h192-s-no-gm?authuser=4">

    
    <!-- FONTES E ÍCONES -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- ESTILOS GLOBAIS -->
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/typography.css">
    
    <!-- ESTILOS DE COMPONENTES -->
    <link rel="stylesheet" href="components/auth/auth.css">
    <link rel="stylesheet" href="components/topo/topo.css">
    <link rel="stylesheet" href="components/esquerda/esquerda.css">
    <link rel="stylesheet" href="components/direita/direita.css">
    <link rel="stylesheet" href="components/popup/popup.css">
    <link rel="stylesheet" href="components/editor/modulos/tags/tags.css">
    <link rel="stylesheet" href="components/direita/brain-idle.css">
    <link rel="stylesheet" href="components/direita/xsat-loading.css">
    <link rel="stylesheet" href="styles/mobile.css">
    <link rel="stylesheet" href="components/direita/xsat-ai.css">
</head>
<body>

    <!-- TELAS INICIAIS -->
    <div id="loading-screen"><div class="spinner"></div><div class="loading-text">Sincronizando...</div></div>

    <div id="login-screen">
        <div class="login-card">
            <h2><i class="fa-solid fa-lock" style="color: var(--primary);"></i> Acesso Restrito</h2>
            <input type="email" id="emailInput" placeholder="Email...">
            <input type="password" id="passwordInput" placeholder="Password...">
            <div id="login-error">Credenciais incorretas.</div>
            <button id="btnLogin">Entrar</button>
        </div>
    </div>

    <!-- ÁREAS DE INJEÇÃO DE COMPONENTES (HTML EXTERNO) -->
    <div id="area-popup-criar"></div>
    <div id="area-popup-confirmar"></div>
    <div id="area-popup-restaurar"></div>
    <div id="area-popup-cores"></div>
    <div id="area-popup-editar-cor"></div>
    <div id="area-popup-partilhar"></div>
    <div id="area-popup-settings"></div>
    <div id="area-popup-browser"></div>
    <div id="area-popup-tags"></div>
    <div id="area-popup-codex-browser"></div>
    <div id="area-popup-confirmar-remover"></div>
    <div id="area-popup-cosmos"></div> <!-- NOVO: Contentor para os Popups do Cosmos -->
    <div id="area-pasta"></div> 
    <div id="area-popup-ferramentas-inline"></div>
    <div id="area-popup-confirmar-brain"></div>
    <div id="area-popup-topicos"></div>
    <div id="area-popup-confirmar-topico"></div>
    <div id="area-popup-cv-imagem"></div>
    <div id="area-popup-confirmar-restauro"></div>
    <div id="area-popup-tags-nota"></div>
    <div id="area-popup-aviso"></div>
    <div id="area-popup-link-topico"></div>
    <div id="area-popup-edit-codex-topico"></div>
    <div id="area-popup-biblia-citacao"></div>
    <div id="area-popup-cosmos-fontes"></div>
    <div id="area-popup-ancora-nota"></div>
    <div id="area-popup-lab"></div>
    <div id="area-popup-confirmar-arquivo-remover"></div>
    <div id="area-popup-arquivo-form"></div>
    <div id="area-popup-criar-share"></div>
    <div id="area-popup-confirmar-amigo"></div>
    <div id="area-popup-gestao-share"></div>
    <div id="area-popup-gestao-avisos"></div>
    <div id="area-popup-mover-item-local"></div>
    <div id="area-popup-gestao-item-local"></div>
    <div id="area-popup-partilhar-v2"></div>
    <div id="area-popup-blackbox"></div>
    <div id="popup-biblia-citacao-overlay" class="popup-overlay" style="z-index: 10500;"></div>
    





    <!-- ESTRUTURA PRINCIPAL -->
    <nav class="top-menu">
        <button class="mobile-toggle" id="btn-mobile-esquerda"><i class="fa-solid fa-bars"></i></button>
        <div class="top-menu-links" id="area-topo"></div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <button class="mobile-toggle" id="btn-mobile-direita"><i class="fa-solid fa-layer-group"></i></button>
         <button class="btn-settings" id="btnDefinicoes" style="display: flex; position: relative; align-items: center; justify-content: center;">
    <i class="fa-solid fa-gear"></i>
    
    <!-- PONTO DE NOTIFICAÇÃO (BADGE) -->
    <span id="notificacao-amigos-badge" style="
        display: none;  position: absolute;  top: 2px; right: 2px; width: 10px; height: 10px; background-color: #ef4444; border-radius: 50%; border: 2px solid #020617; z-index: 10; box-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
    "></span>
</button>
        </div>
    </nav>

    <div class="main-container">
        <div class="mobile-overlay" id="mobile-overlay"></div>
        
        <!-- Coluna Esquerda -->
        <aside class="column left-col" id="area-esquerda"></aside>
        
        <!-- Editor Central -->
        <main class="center-col" id="area-editor"></main>
        
        <!-- Coluna Direita -->
        <aside class="column right-col" id="area-direita"></aside>
    </div>

    <!-- LÓGICA DO SISTEMA -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        import { firebaseConfig } from './firebase-config.js';
        import { iniciarAutenticacao } from './components/auth/auth.js';
        import { inicializarCriacaoPasta } from './components/local/criar-pasta.js';
        import { inicializarCriacaoNota } from './components/local/criar-nota.js';
        import { inicializarLeituraLocal } from './components/local/ler-local.js';
        import { inicializarLists } from './components/lists/ler-lists.js'; 
        import { inicializarSettings } from './components/settings/settings.js';
        import { iniciarCodexBrowser } from './components/editor/modulos/codex-browser.js';
        import { mostrarBrainIdle } from './components/direita/brain-idle.js';
        import { iniciarXSat } from './components/direita/xsat-controller.js';
        import { inicializarShare, mostrarPainelShare, vigiarConvitesPendentes } from './components/share/ler-share.js';
        import { iniciarControladorEsquerda } from './components/esquerda/esquerda-controller.js';
        import { inicializarLeituraShare } from './components/share/ler-share.js';
        import { inicializarCriacaoShare } from './components/share/criar-share.js';
        import { inicializarAmigos } from './components/settings/amigos.js';
        import { inicializarGestaoLocal } from './components/local/gestao-local.js';
        import { vigiarConvitesEntrada } from './components/local/convites-manager.js';
        import { inicializarLeituraPins } from './components/esquerda/ler-pins.js';
        import { verificarItensExpirados } from './components/settings/recycle-manager.js';
        import { iniciarSelectorBiblia } from './components/editor/modulos/biblia-selector.js';
        import { MobileBottomSheet } from './components/ui/mobile-bottom-sheet.js';
        


        import { } from './components/editor/modulos/bloqueio-controller.js';
        import { } from './components/share/gestao-itens-share.js';



        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app); 
        const authInstance = getAuth(app);
        MobileBottomSheet.iniciar();

        window.db = db;
window.auth = authInstance;

        // Função de carregamento dinâmico de HTML
        async function carregarComponente(idElemento, caminhoFicheiro) {
            const el = document.getElementById(idElemento);
            if(!el) return;
            try {
                const response = await fetch(caminhoFicheiro);
                if (!response.ok) throw new Error("Falha ao carregar " + caminhoFicheiro);
                el.innerHTML = await response.text();
            } catch (e) { console.error("Erro no fetch:", caminhoFicheiro, e); }
        }

        // Carregar todos os fragmentos HTML antes de iniciar a lógica JS
        await Promise.all([
            carregarComponente('area-editor', 'components/editor/editor.html'), 
            carregarComponente('area-popup-criar', 'components/popup/popup-criar.html'), 
            carregarComponente('area-popup-confirmar', 'components/popup/popup-confirmar.html'), 
            carregarComponente('area-popup-restaurar', 'components/popup/popup-restaurar.html'), 
            carregarComponente('area-popup-cores', 'components/popup/popup-cores.html'), 
            carregarComponente('area-popup-editar-cor', 'components/popup/popup-editar-cor.html'), 
            carregarComponente('area-popup-partilhar', 'components/popup/popup-partilhar.html'),
            carregarComponente('area-popup-settings', 'components/settings/settings.html'),
            carregarComponente('area-popup-browser', 'components/popup/popup-browser.html'),
            carregarComponente('area-popup-tags', 'components/popup/popup-tags.html'),
            carregarComponente('area-popup-codex-browser', 'components/popup/popup-codex-browser.html'),
            carregarComponente('area-popup-confirmar-remover', 'components/popup/popup-confirmar-remover.html'),
            carregarComponente('area-popup-cosmos', 'components/popup/popup-cosmos.html'), // INJEÇÃO COSMOS
            carregarComponente('area-pasta', 'components/local/criar-pasta.html'), 
            carregarComponente('area-topo', 'components/topo/menu.html'),
            carregarComponente('area-esquerda', 'components/esquerda/menu.html'),
            carregarComponente('area-direita', 'components/direita/menu.html'),
            carregarComponente('area-popup-ferramentas-inline', 'components/popup/popup-ferramentas.html'),
            carregarComponente('area-popup-confirmar-brain', 'components/popup/popup-confirmar-brain.html'),
            carregarComponente('area-popup-topicos', 'components/popup/popup-topicos.html'),    
            carregarComponente('area-popup-confirmar-topico', 'components/popup/popup-confirmar-topico.html'),
            carregarComponente('area-popup-cv-imagem', 'components/popup/popup-cartaovisita-imagem.html'),
            carregarComponente('area-popup-confirmar-restauro', 'components/popup/popup-confirmar-restauro.html'),
            carregarComponente('area-popup-tags-nota', 'components/popup/popup-tags-nota.html'),
            carregarComponente('area-popup-aviso', 'components/popup/popup-aviso.html'),
            carregarComponente('area-popup-link-topico', 'components/popup/popup-link-topico.html'),
            carregarComponente('area-popup-edit-codex-topico', 'components/popup/popup-edit-codex-topico.html'),
            carregarComponente('area-popup-biblia-citacao', 'components/popup/popup-biblia-citacao.html'),
            carregarComponente('area-popup-cosmos-fontes', 'components/popup/popup-cosmos-fontes.html'),
            carregarComponente('area-popup-ancora-nota', 'components/popup/popup-ancora-nota.html'),
            carregarComponente('area-popup-lab', 'components/popup/popup-lab.html'),
            carregarComponente('area-popup-confirmar-arquivo-remover', 'components/popup/popup-confirmar-arquivo-remover.html'),
            carregarComponente('area-popup-arquivo-form', 'components/popup/popup-arquivo-form.html'),
            carregarComponente('area-popup-criar-share', 'components/popup/popup-criar-share.html'),
            carregarComponente('area-popup-confirmar-amigo', 'components/popup/popup-confirmar-amigo.html'),
            carregarComponente('area-popup-gestao-share', 'components/popup/popup-share-nota.html'),
            carregarComponente('area-popup-gestao-avisos', 'components/popup/popup-gestao-avisos.html'),
            carregarComponente('area-popup-gestao-item-local', 'components/local/popups-gestao.html'),
            carregarComponente('area-popup-partilhar-v2', 'components/popup/popup-partilhar-v2.html'),
            carregarComponente('area-popup-blackbox', 'components/popup/popup-confirmar-blackbox.html'),


      ]);

        // 4. Iniciar Motores Globais
        MobileBottomSheet.iniciar(); 
        iniciarAutenticacao(app, db); 
        iniciarCodexBrowser(); 
        iniciarXSat();
        iniciarControladorEsquerda(); // Navegação Local/Share/Lists

        // 5. Vigiar Login e Iniciar Lógicas de Utilizador
       onAuthStateChanged(authInstance, async (user) => {
    if (user) {
        console.log("🚀 Sessão ativa. A iniciar sincronização de dados...");

                inicializarCriacaoPasta(db, authInstance);
                inicializarCriacaoNota(db, authInstance);
                inicializarLeituraLocal(db, authInstance);
                inicializarLists(db, authInstance); 
                inicializarSettings(db, authInstance);
                inicializarLeituraShare(db, authInstance);
                inicializarCriacaoShare(db, authInstance);
                inicializarAmigos(db, authInstance);
                inicializarLeituraLocal(db, authInstance);
                inicializarGestaoLocal();
                inicializarLeituraPins(db, authInstance);
                iniciarSelectorBiblia();
                
         
                
         

                vigiarConvitesPendentes(db, authInstance);
                vigiarConvitesEntrada(db, authInstance);
                  /**
         * B) AGUARDAR CARREGAMENTO TOTAL
         * Esperamos que o browser processe o HTML injetado e 
         * damos 800ms para o Firebase disparar os primeiros Snapshots (Amigos/Local)
         */
        setTimeout(() => {
            verificarItensExpirados(db, user.uid);
        }, 2000);

        /**
         * GESTÃO DA TELA DE CARREGAMENTO
         * Esperamos que o browser processe o HTML injetado e 
         * damos 800ms para o Firebase disparar os primeiros Snapshots
         */
        setTimeout(() => {
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
                loadingScreen.style.transition = "opacity 0.5s ease";
                loadingScreen.style.opacity = '0';
                
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    console.log("✅ Sistema totalmente sincronizado e pronto.");
                }, 500);
            }
        }, 800); 

    } else {
        // Se não houver utilizador, garantimos que o loading sai para mostrar o login
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) loadingScreen.style.display = 'none';
        console.log("🔒 Nenhuma sessão ativa.");
    }
});










        // 6. Gestão Global de Popups (Abertura/Fecho básico)
document.addEventListener('click', (e) => {
    
    // LOG INICIAL: Ver exatamente o que foi tocado
    console.log("%c🖱️ Clique detetado em:", "color: #94a3b8", e.target);

    // 1. BOTÃO "X" DA BOTTOM SHEET (Direita)
    if (e.target.closest('#btn-close-bottom-sheet')) {
        console.log("%c✅ Alvo: X da Bottom Sheet", "color: #ef4444; font-weight: bold;");
        if (typeof MobileBottomSheet !== 'undefined') MobileBottomSheet.fechar();
        return;
    }

    // 2. BOTÃO "X" DE QUALQUER POPUP
    const btnFecharPopup = e.target.closest('.popup-header button:not(#btn-close-bottom-sheet)');
    if (btnFecharPopup || e.target.closest('.btn-cancelar')) {
        console.log("%c✅ Alvo: X de Popup", "color: #ef4444; font-weight: bold;");
        const popup = e.target.closest('.popup-overlay');
        if (popup) popup.classList.remove('active');
        return;
    }

    // 3. BOTÃO "+" EM LOCAL OU SHARE
    if (e.target.closest('#btn-add-novo-inline, #btn-add-share')) {
        console.log("%c✅ Alvo: + de Criação Lateral", "color: #6366f1; font-weight: bold;");
        const popupId = e.target.closest('#btn-add-share') ? 'popup-criar-share-overlay' : 'popup-criar-overlay';
        const popup = document.getElementById(popupId);
        if (popup) {
            popup.classList.add('active');
            if (window.innerWidth <= 768) {
                document.getElementById('area-esquerda').classList.add('closed');
                document.getElementById('mobile-overlay').classList.remove('active');
            }
        }
        return;
    }

    // 4. BOTÕES DE ACÇÃO DO BRAIN (O teu problema está aqui)
    // Procuramos os botões nos 3 possíveis cabeçalhos do Brain
    const btnBrain = e.target.closest('#header-action-biblia button, #header-action-container button, #biblio-header-action-container button');
    
    if (btnBrain) {
        console.log("%c🎯 Alvo: Botão de Ação do Brain", "color: #fbbf24; font-weight: bold;");

        // Detetar qual o ícone dentro do botão para saber a ação
        const icon = btnBrain.querySelector('i');
        
        if (!icon) {
            console.warn("⚠️ Botão detetado mas nenhum ícone <i> encontrado lá dentro!");
            return;
        }

   
// --- No index.html, dentro do Gestor de Cliques ---

if (icon.classList.contains('fa-plus')) {
    // 1. Descobrir qual é a aba ativa no momento (Puzzle, Links, Dossie ou Cita)
    // Procuramos o ícone que tem a classe 'active' na barra de navegação do Brain
    const abaAtiva = document.querySelector('.cosmos-nav-icons i.active')?.dataset.aba;

    console.log(`🚀 [CLICK-ROUTER] Botão + detetado na aba: ${abaAtiva}`);

    if (abaAtiva === 'puzzle') {
        // Se estivermos no Puzzle -> CRIAR CAIXA DE TEXTO
        window.dispatchEvent(new CustomEvent('bible:adicionarTexto'));
        window.dispatchEvent(new CustomEvent('cosmos:adicionarTexto'));
    } 
    else if (abaAtiva === 'dossie') {
        // Se estivermos no Dossiê -> ABRIR SELETOR DE REFERÊNCIAS
        console.log("📂 Dossie: Abrindo Seletor de Referências");
        window.dispatchEvent(new CustomEvent('brain:abrirReferenciaMica'));
    }
    return;
}


        else if (icon.classList.contains('fa-link')) {
            console.log("🚀 Acção: [ABRIR FONTES]");
            window.dispatchEvent(new CustomEvent('brain:abrirPopupFontes'));
        } 
        else if (icon.classList.contains('fa-folder-plus')) {
            console.log("🚀 Acção: [NOVA MICA]");
            window.dispatchEvent(new CustomEvent('brain:abrirMicaPopup'));
        }
        return;
    }


// ==========================================================
    // 🤖 COLA ESTE BLOCO EXATAMENTE AQUI:
    // ==========================================================
    const btnNexo = e.target.closest('.btn-nexo-ai');
    if (btnNexo) {
        console.log("🤖 Nexo AI: Capturando texto do contentor...");
        const containerPai = btnNexo.closest('div[style*="border-radius"]'); 
        const areaTexto = containerPai.querySelector('textarea');
        
        if (areaTexto) {
            const conteudo = areaTexto.value;
            if (typeof window.dispararNexoAI === 'function') {
                window.dispararNexoAI(conteudo);
            }
        }
        return; 
    }





    // 5. CLIQUE NO OVERLAY
    if (e.target.id === 'mobile-overlay') {
        console.log("%c✅ Alvo: Overlay Baço", "color: #94a3b8;");
        document.getElementById('area-esquerda').classList.add('closed');
        document.getElementById('area-direita').classList.remove('active');
        document.getElementById('mobile-overlay').classList.remove('active');
        return;
    }
});


        // 7. Troca de Painéis EYE / BRAIN / X-SAT
window.switchPanel = (p) => {
    // 1. Lógica Normal de troca de abas
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.segmented-control button').forEach(b => b.classList.remove('active'));
    
    const targetPanel = document.getElementById('panel-' + p);
    const targetBtn = document.getElementById('btn-' + p);
    
    if(targetPanel) targetPanel.classList.add('active');
    if(targetBtn) targetBtn.classList.add('active');

    // Lógica de IDLE do Cérebro
    if (p === 'brain' && !document.querySelector('.cosmos-brain-wrapper')) {
        if (typeof mostrarBrainIdle === 'function') mostrarBrainIdle();
    }

    // --- NOVO: GATILHO MOBILE ---
    // Se estivermos em mobile, sempre que trocamos de painel (EYE, BRAIN ou X-SAT), 
    // forçamos a Bottom Sheet a subir.
    if (window.innerWidth <= 768) {
        if (typeof MobileBottomSheet !== 'undefined') {
            MobileBottomSheet.abrir();
        }
    }
};

        // 8. Mobile Controls
       document.getElementById('btn-mobile-esquerda').onclick = () => {
    const esq = document.getElementById('area-esquerda');
    const overlay = document.getElementById('mobile-overlay');
    
    const isOpen = esq.classList.toggle('closed');
    
    // Se abriu o menu (não tem a classe closed), mostra o overlay
    if (!isOpen) {
        overlay.classList.add('active');
    } else {
        overlay.classList.remove('active');
    }
};

// Fechar ao clicar no overlay
document.getElementById('mobile-overlay').onclick = () => {
    // Fecha a esquerda
    document.getElementById('area-esquerda').classList.add('closed');
    // Fecha a direita (bottom sheet)
    document.getElementById('area-direita').classList.remove('active');
    // Remove o overlay
    document.getElementById('mobile-overlay').classList.remove('active');
};

    document.getElementById('btn-mobile-direita').onclick = () => {
    MobileBottomSheet.abrir();
};

    </script>
</body>
</html>
