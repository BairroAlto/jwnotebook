<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>BOOK | notABook X</title>

    <link rel="manifest" href="manifest-book.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="notABook Book">
    <link rel="icon" type="image/svg+xml" href="icons/book/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/book/favicon-96x96.png">
    <link rel="shortcut icon" href="icons/book/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/book/apple-touch-icon.png">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_17_Pro_Max__iPhone_16_Pro_Max_portrait.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_17_Pro__iPhone_17__iPhone_16_Pro_portrait.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_16_Plus__iPhone_15_Pro_Max__iPhone_15_Plus__iPhone_14_Pro_Max_portrait.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_16__iPhone_15_Pro__iPhone_15__iPhone_14_Pro_portrait.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_8__iPhone_7__iPhone_6s__iPhone_6__4.7__iPhone_SE_portrait.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">

    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link rel="stylesheet" href="components/auth/auth.css">
    <link rel="stylesheet" href="components/topo/topo.css">
    <link rel="stylesheet" href="components/esquerda/esquerda.css">
    <link rel="stylesheet" href="components/direita/direita.css">
    <link rel="stylesheet" href="components/direita/brain-idle.css">
    <link rel="stylesheet" href="components/direita/xsat-loading.css">
    <link rel="stylesheet" href="components/direita/xsat-ai.css">
    <link rel="stylesheet" href="components/popup/popup.css">
    <link rel="stylesheet" href="components/bible-portal/bible-portal.css">
    <link rel="stylesheet" href="components/book/book.css">
    <link rel="stylesheet" href="components/book/book-mobile.css">
    <link rel="stylesheet" href="styles/mobile.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="book-body book-readonly">
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">A preparar o Book...</div>
    </div>

    <div id="login-screen" style="display:none;">
        <div class="login-card">
            <h2><i class="fa-solid fa-lock" style="color: var(--primary);"></i> Acesso Restrito</h2>
            <input type="email" id="emailInput" placeholder="Email...">
            <input type="password" id="passwordInput" placeholder="Password...">
            <div id="login-error">Credenciais incorretas.</div>
            <button id="btnLogin">Entrar</button>
        </div>
    </div>

    <div id="area-popup-topicos"></div>
    <div id="area-popup-confirmar-topico"></div>
    <div id="area-popup-cosmos"></div>
    <div id="area-popup-confirmar"></div>
    <div id="area-popup-confirmar-remover"></div>
    <div id="area-popup-confirmar-brain"></div>
    <div id="area-popup-cosmos-fontes"></div>
    <div id="area-popup-ancora-nota"></div>
    <div id="area-popup-biblia-citacao"></div>

    <nav class="top-menu">
        <button class="mobile-toggle" id="btn-mobile-esquerda"><i class="fa-solid fa-bars"></i></button>
        <div class="top-menu-links" id="area-topo"></div>
        <div class="book-top-actions">
            <button class="mobile-toggle" id="btn-mobile-direita"><i class="fa-solid fa-layer-group"></i></button>
            <button class="btn-settings" id="book-btn-settings" title="Definições do Book">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </nav>

    <div class="main-container book-shell">
        <div class="mobile-overlay" id="mobile-overlay"></div>
        <aside class="column left-col closed" id="area-esquerda"></aside>
        <main class="center-col book-center" id="area-book"></main>
        <aside class="column right-col book-right" id="area-direita"></aside>
    </div>

    <div id="book-popup-settings" class="popup-overlay">
        <div class="popup-content book-settings-modal">
            <div class="popup-header">
                <h3>Definições Book</h3>
                <button id="book-settings-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="book-settings-body">
                <section class="book-settings-section">
                    <div class="book-settings-section-head">
                        <span>Leitura</span>
                        <small>Conforto visual da nota</small>
                    </div>
                    <div class="book-setting-row">
                        <div>
                            <label>Aumentar texto</label>
                            <span id="book-font-value">17px</span>
                        </div>
                        <input type="range" id="book-font-range" min="14" max="28" value="17">
                    </div>
                </section>
                <section class="book-settings-section">
                    <div class="book-settings-section-head">
                        <span>Estrutura</span>
                        <small>Modo de apresentação</small>
                    </div>
                    <div class="book-setting-row">
                        <label>Modo de visualização</label>
                        <div class="book-segmented" id="book-view-mode">
                            <button data-mode="cards" class="active"><i class="fa-solid fa-grip"></i> Caixas</button>
                            <button data-mode="sequence"><i class="fa-solid fa-align-left"></i> Sequência</button>
                        </div>
                    </div>
                    <div class="book-setting-row">
                        <label>Posição das etiquetas</label>
                        <div class="book-segmented book-segmented-compact" id="book-tag-position">
                            <button data-pos="bottom" class="active"><i class="fa-solid fa-arrow-down"></i> Fundo</button>
                            <button data-pos="top"><i class="fa-solid fa-arrow-up"></i> Topo</button>
                        </div>
                    </div>
                </section>
                <section class="book-settings-section">
                    <div class="book-settings-section-head">
                        <span>Acabamento</span>
                        <small>Detalhes visuais das caixas</small>
                    </div>
                    <div class="book-setting-row">
                        <label>Margens das ferramentas</label>
                        <div class="book-segmented book-segmented-mini book-segmented-compact" id="book-margin-style">
                            <button data-margin="dotted"><i class="fa-solid fa-border-none"></i> Picotado</button>
                            <button data-margin="solid" class="active"><i class="fa-solid fa-border-top-left"></i> Linhas</button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="book-popup-speech" class="popup-overlay">
        <div class="popup-content book-settings-modal">
            <div class="popup-header">
                <h3>Ler nota</h3>
                <button data-close-popup><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="book-settings-body book-reader-body">
                <label class="book-label">Voz</label>
                <select id="book-voice-select"></select>
                <div id="book-voice-cards" class="book-voice-cards"></div>
                <label class="book-label">Velocidade</label>
                <div class="book-rate-row"><span>Lento</span><strong id="book-speech-rate-value">1.0x</strong><span>Rápido</span></div>
                <input type="range" id="book-speech-rate" min="0.6" max="1.6" step="0.1" value="1">
                <div class="book-player">
                    <button id="book-speech-play"><i class="fa-solid fa-play"></i></button>
                    <button id="book-speech-pause"><i class="fa-solid fa-pause"></i></button>
                    <button id="book-speech-stop"><i class="fa-solid fa-stop"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="book-popup-games" class="popup-overlay">
        <div class="popup-content book-games-modal">
            <div class="popup-header">
                <h3><i class="fa-solid fa-gamepad"></i> Núcleo de Modos</h3>
                <button data-close-popup><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="ai-tabs-container">
                <button class="ai-tab active" data-book-game-tab="study">ESTUDO</button>
                <button class="ai-tab" data-book-game-tab="sentinel">SENTINELA</button>
                <button class="ai-tab" data-book-game-tab="bookai">BOOKAI</button>
                <button class="ai-tab icon-only" data-book-game-tab="scores" title="Pontos"><i class="fa-solid fa-chart-simple"></i></button>
            </div>
            <div id="book-games-body" class="book-games-body"></div>
        </div>
    </div>

    <div id="book-game-card-overlay" class="popup-overlay">
        <div class="popup-content book-game-card-modal">
            <div class="popup-header">
                <h3 id="book-game-card-title">Jogo</h3>
                <button id="book-game-card-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="book-game-card-body" class="book-game-card-body"></div>
        </div>
    </div>

    <div id="book-popup-ai" class="popup-overlay">
        <div class="popup-content bible-search-modal" style="max-width: 520px;">
            <div class="popup-header">
                <div class="book-ai-title"><i class="fa-brands fa-mailchimp"></i><h3>BookAI Nota</h3></div>
                <button data-close-popup><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="ai-tabs-container">
                <button class="ai-tab active" data-book-ai-tab="chat">CHAT</button>
                <button class="ai-tab" data-book-ai-tab="protocols">PROTOCOLOS</button>
            </div>
            <div class="bible-search-body ai-modal-body">
                <div id="book-ai-chat" class="ai-content-view active">
                    <div id="book-chat-messages"></div>
                    <div class="bookai-mode-row">
                        <button class="bookai-mode-pill active" data-book-ai-mode="local">Local</button>
                    </div>
                    <div class="chat-input-wrapper">
                        <input type="text" id="book-ai-input" placeholder="Pergunta sobre esta nota...">
                        <button id="book-ai-send" aria-label="Enviar para o BookAI"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
                <div id="book-ai-protocols" class="ai-content-view">
                    <div id="book-ai-protocols-grid" class="btn-protocolo-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="book-sentinel-fab" class="book-sentinel-fab hidden"><i class="fa-solid fa-newspaper"></i></div>
    <div id="book-sentinel-sheet" class="book-sentinel-sheet hidden">
        <div class="book-sentinel-head">
            <button id="book-sentinel-top-back" class="book-sentinel-top-back hidden">
                <i class="fa-solid fa-chevron-left"></i>
                <span>Voltar</span>
            </button>
            <div class="book-sentinel-head-center">
                <div class="mobile-sheet-handle"></div>
            </div>
            <div class="book-sentinel-head-actions">
                <button id="book-sentinel-min"><i class="fa-solid fa-minus"></i></button>
                <button id="book-sentinel-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
        </div>
        <div id="book-sentinel-content"></div>
    </div>

    <script type="module" src="components/book/book-main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .catch(err => console.log('Erro PWA Book:', err));
        });
      }
    </script>
</body>
</html>
