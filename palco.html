<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>PALCO | notABook X</title>

    <link rel="manifest" href="manifest-palco.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="notABook Palco">
    <link rel="icon" type="image/svg+xml" href="icons/book/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/book/favicon-96x96.png">
    <link rel="shortcut icon" href="icons/book/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/book/apple-touch-icon.png">

    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link rel="stylesheet" href="components/auth/auth.css">
    <link rel="stylesheet" href="components/topo/topo.css">
    <link rel="stylesheet" href="components/popup/popup.css">
    <link rel="stylesheet" href="components/palco/palco.css">
    <link rel="stylesheet" href="components/palco/palco-mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="palco-body">
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">A abrir o Palco...</div>
    </div>

    <div id="login-screen" style="display:none;">
        <div class="login-card">
            <h2><i class="fa-solid fa-lock" style="color: var(--primary);"></i> Acesso Restrito</h2>
            <input type="email" id="emailInput" placeholder="Email...">
            <input type="password" id="passwordInput" placeholder="Password...">
            <div id="login-error">Credenciais incorretas.</div>
            <button id="btnLogin">Entrar</button>
        </div>
    </div>

    <div id="area-popup-partilhar"></div>

    <nav class="top-menu">
        <button class="mobile-toggle" id="btn-mobile-esquerda"><i class="fa-solid fa-bars"></i></button>
        <div class="top-menu-links" id="area-topo"></div>
        <div class="palco-top-actions">
            <button class="mobile-toggle" id="btn-mobile-direita"><i class="fa-solid fa-layer-group"></i></button>
            <button class="btn-settings" id="palco-btn-notifications" title="Novidades do Palco">
                <i class="fa-solid fa-bell"></i>
                <span id="palco-notification-badge" class="palco-notification-badge" style="display:none;"></span>
            </button>
            <button class="btn-settings" id="palco-btn-settings" title="Definições do Palco">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>
    </nav>

    <div class="palco-shell">
        <div class="mobile-overlay" id="palco-mobile-overlay"></div>
        <aside class="palco-column palco-left" id="palco-left"></aside>
        <main class="palco-column palco-center" id="palco-center"></main>
        <aside class="palco-column palco-right" id="palco-right"></aside>
    </div>

    <div id="palco-settings-overlay" class="popup-overlay">
        <div class="popup-content palco-settings-modal">
            <div class="popup-header">
                <h3>Definições PALCO</h3>
                <button data-close-palco-popup><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="palco-settings-body">
                <section class="palco-settings-section">
                    <div class="palco-settings-section-head">
                        <span>Leitura</span>
                        <small>Escala da coluna central</small>
                    </div>
                    <div class="palco-setting-row">
                        <div>
                            <label>Tamanho do texto</label>
                            <span id="palco-font-value">16px</span>
                        </div>
                        <input type="range" id="palco-font-range" min="14" max="24" value="16">
                    </div>
                </section>
                <section class="palco-settings-section">
                    <div class="palco-settings-section-head">
                        <span>Social</span>
                        <small>Partilha da tua atividade</small>
                    </div>
                    <div class="palco-setting-row palco-toggle-row">
                        <div>
                            <label>Partilhar Amigos?</label>
                            <small>Permite mostrar atividade do Palco aos teus amigos</small>
                        </div>
                        <label class="switch-container">
                            <input type="checkbox" id="palco-share-toggle">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="palco-notifications-overlay" class="popup-overlay">
        <div class="popup-content palco-settings-modal">
            <div class="popup-header">
                <h3>Novidades do Palco</h3>
                <button data-close-palco-popup><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="palco-notifications-body" class="palco-settings-body palco-notifications-body"></div>
        </div>
    </div>

    <script type="module" src="components/palco/palco-main.js"></script>
    
    <!-- Monitor do Sistema de Atualizações do Ruler -->
    <script type="module" src="./components/updates/checker.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .catch(err => console.log('Erro PWA Palco:', err));
        });
      }
    </script>
</body>
</html>
