<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador MWB PRO - 10 Semanas</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --dark: #1a1a1d;
            --bg-editor: #252528;
            --border: #444;
            --text: #e0e0e0;
            
            --color-subtema: #8e44ad;
            --color-pergunta: #e67e22;
            --color-paragrafo: #3498db;
            --color-resumo: #2ecc71;
            --color-rodape: #7f8c8d;
        }

        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: var(--dark); color: var(--text); overflow: hidden; }

        /* PAINEL ESQUERDO (EDITOR) */
        .panel-left { flex: 1; max-width: 40%; display: flex; flex-direction: column; border-right: 2px solid #000; background: var(--bg-editor); }
        
        .tabs-bar { display: flex; background: #111; padding: 10px; gap: 5px; border-bottom: 1px solid var(--border); }
        .tab { 
            flex: 1; padding: 10px; background: #333; border: 1px solid var(--border); 
            text-align: center; cursor: pointer; font-weight: bold; border-radius: 4px; color: #888; transition: 0.2s;
        }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tab.has-content { border-top: 3px solid var(--success); color: #ccc; }

        .editor-area { padding: 20px; display: flex; flex-direction: column; gap: 15px; flex-grow: 1; overflow-y: auto; }
        label { font-size: 0.75em; font-weight: bold; color: #aaa; text-transform: uppercase; margin-bottom: -5px; }
        input, select, textarea { 
            background: #111; border: 1px solid var(--border); color: white; 
            padding: 12px; border-radius: 4px; width: 100%; box-sizing: border-box;
        }
        textarea { flex-grow: 1; min-height: 350px; font-family: 'Consolas', monospace; resize: none; font-size: 0.9em; line-height: 1.5; }

        /* PAINEL DIREITO (PREVIEW) */
        .panel-right { flex: 1.5; background: #0f0f0f; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }
        .preview-scroll { flex: 1; overflow-y: auto; padding-right: 15px; border-radius: 4px; }

        /* BLOCOS DA PREVIEW */
        .block-item {
            background: #1e1e1e; border-radius: 4px; margin-bottom: 5px;
            display: flex; align-items: center; gap: 12px; padding: 6px 12px;
            border-left: 6px solid #333; height: 36px; transition: 0.1s;
        }
        .type-subtema { border-left-color: var(--color-subtema); }
        .type-pergunta { border-left-color: var(--color-pergunta); }
        .type-paragrafo { border-left-color: var(--color-paragrafo); }
        .type-resumo { border-left-color: var(--color-resumo); }
        .type-rodape { border-left-color: var(--color-rodape); }

        .type-select { 
            font-size: 0.65em; font-weight: 900; padding: 3px; width: 95px; 
            background: #252525; border: 1px solid #444; color: #aaa; cursor: pointer;
        }
        .num-tag { 
            background: #333; color: white; padding: 2px 6px; border-radius: 3px; 
            font-size: 0.8em; font-weight: bold; min-width: 25px; text-align: center;
        }
        .content-body { 
            flex: 1; font-size: 0.95em; white-space: nowrap; overflow: hidden; 
            text-overflow: ellipsis; outline: none; font-weight: 500;
        }
        .content-body:focus { 
            white-space: normal; background: #2d2d2d; padding: 10px; 
            position: absolute; z-index: 100; left: 45%; right: 40px; 
            border: 1px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* BOTÃO DE CÓPIA */
        .btn-copy { 
            background: var(--success); color: white; border: none; padding: 18px; 
            font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; 
            margin-top: 15px; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-copy:hover { background: #219150; transform: translateY(-2px); }

    </style>
</head>
<body>

    <!-- EDITOR -->
    <div class="panel-left">
        <div class="tabs-bar" id="tabsBar"></div>
        <div class="editor-area">
            <label>Mês do Ficheiro (Título do JSON)</label>
            <select id="mesGlobal" onchange="syncCurrent()">
                <option value="JANEIRO">JANEIRO</option>
                <option value="FEVEREIRO">FEVEREIRO</option>
                <option value="MARÇO">MARÇO</option>
                <option value="ABRIL">ABRIL</option>
                <option value="MAIO">MAIO</option>
                <option value="JUNHO">JUNHO</option>
                <option value="JULHO">JULHO</option>
                <option value="AGOSTO">AGOSTO</option>
                <option value="SETEMBRO">SETEMBRO</option>
                <option value="OUTUBRO">OUTUBRO</option>
                <option value="NOVEMBRO">NOVEMBRO</option>
                <option value="DEZEMBRO">DEZEMBRO</option>
            </select>

            <label>Referência da Semana</label>
            <input type="text" id="inpRef" placeholder="Ex: mwb26 janeiro pp. 2-7" oninput="syncCurrent()">

            <label>Título da Semana (Auto-detetado)</label>
            <input type="text" id="inpTitle" placeholder="Aguardando texto..." readonly style="background: #181818; color: #3498db; font-weight: bold;">

            <label>Texto da Semana (Colar aqui)</label>
            <textarea id="rawInput" placeholder="Cole o conteúdo aqui..." oninput="autoProcess()"></textarea>
        </div>
    </div>

    <!-- PREVIEW -->
    <div class="panel-right">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="font-size: 1.1rem; color: var(--primary); margin: 0; text-transform: uppercase;">Preview Interativo</h2>
            <span id="stats" style="font-size: 0.7rem; color: #555;"></span>
        </div>
        <div class="preview-scroll" id="previewContainer"></div>
        <button class="btn-copy" onclick="copyJSON()">📋 Copiar JSON Consolidado</button>
    </div>

<script>
    let articles = Array.from({ length: 10 }, () => ({
        ref: "", title: "", raw: "", blocks: []
    }));
    let currentIdx = 0;

    function initTabs() {
        const bar = document.getElementById('tabsBar');
        bar.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const btn = document.createElement('div');
            btn.className = `tab ${i === currentIdx ? 'active' : ''} ${articles[i].raw.length > 0 ? 'has-content' : ''}`;
            btn.textContent = i + 1;
            btn.onclick = () => switchTab(i);
            bar.appendChild(btn);
        }
    }

    function switchTab(newIdx) {
        saveCurrent();
        currentIdx = newIdx;
        loadCurrent();
        initTabs();
        renderPreview();
    }

    function saveCurrent() {
        articles[currentIdx].ref = document.getElementById('inpRef').value;
        articles[currentIdx].title = document.getElementById('inpTitle').value;
        articles[currentIdx].raw = document.getElementById('rawInput').value;
    }

    function loadCurrent() {
        document.getElementById('inpRef').value = articles[currentIdx].ref;
        document.getElementById('inpTitle').value = articles[currentIdx].title;
        document.getElementById('rawInput').value = articles[currentIdx].raw;
    }

    function syncCurrent() {
        saveCurrent();
        renderPreview();
    }

    // ANALISADOR COM DETEÇÃO DE TÍTULO AUTOMÁTICA
    function autoProcess() {
        const raw = document.getElementById('rawInput').value;
        articles[currentIdx].raw = raw;
        
        if (!raw.trim()) {
            articles[currentIdx].blocks = [];
            articles[currentIdx].title = "";
            document.getElementById('inpTitle').value = "";
            renderPreview();
            return;
        }

        let lines = raw.split('\n').map(l => l.trim()).filter(l => l !== "");
        
        // 1. Deteção Automática do Título (Primeira Linha)
        const detectedTitle = lines[0];
        articles[currentIdx].title = detectedTitle;
        document.getElementById('inpTitle').value = detectedTitle;
        
        // Removemos a primeira linha do array para ela não virar um bloco
        lines.shift();

        let tempBlocks = [];
        let pCounter = 1;
        let isFooter = false;

        lines.forEach(line => {
            let cleanLine = line.replace(/^\s*\(\d+\s*min\.?\)\s*/i, "").trim();
            if (cleanLine.toLowerCase().includes("a sua resposta")) return;

            let type = "paragrafo";
            if (/TESOUROS|MINISTÉRIO|VIVER|Cântico/i.test(cleanLine)) type = "subtema";
            else if (/Comentários finais/i.test(cleanLine)) { type = "rodape"; isFooter = true; }
            else if (isFooter) type = "rodape";
            else if (/^(\d+)\./.test(cleanLine)) type = "pergunta";

            let num = null;
            if (type === "paragrafo" || type === "pergunta") {
                const match = cleanLine.match(/^(\d+)\./);
                num = match ? match[1] : pCounter++;
                if (match) cleanLine = cleanLine.replace(/^\d+\.\s*/, "");
            }

            tempBlocks.push({ type, text: cleanLine, number: num });
        });

        articles[currentIdx].blocks = tempBlocks;
        renderPreview();
        initTabs();
    }

    function renderPreview() {
        const container = document.getElementById('previewContainer');
        container.innerHTML = '';
        const blocks = articles[currentIdx].blocks;

        blocks.forEach((block, bIdx) => {
            const div = document.createElement('div');
            div.className = `block-item type-${block.type}`;
            const types = ['subtema', 'pergunta', 'paragrafo', 'resumo', 'rodape'];
            let selectHtml = `<select class="type-select" onchange="changeBlockType(${bIdx}, this.value)">`;
            types.forEach(t => selectHtml += `<option value="${t}" ${block.type === t ? 'selected' : ''}>${t.toUpperCase()}</option>`);
            selectHtml += `</select>`;

            div.innerHTML = `
                ${selectHtml}
                <span class="num-tag">${block.number || ''}</span>
                <div class="content-body" contenteditable="true" onblur="updateBlockText(${bIdx}, this.innerText)">${block.text}</div>
            `;
            container.appendChild(div);
        });

        const activeWeeks = articles.filter(a => a.raw.trim() !== "").length;
        document.getElementById('stats').innerText = `${activeWeeks} SEMANAS ATIVAS`;
    }

    function changeBlockType(bIdx, newType) {
        articles[currentIdx].blocks[bIdx].type = newType;
        renderPreview();
    }

    function updateBlockText(bIdx, newText) {
        articles[currentIdx].blocks[bIdx].text = newText;
    }

    function copyJSON() {
        saveCurrent();
        const mes = document.getElementById('mesGlobal').value;
        const finalObj = {
            titulo: `MWB - ${mes}`,
            artigos: articles
                .filter(a => a.raw.trim() !== "")
                .map(a => ({
                    referencia: a.ref,
                    titulo: a.title,
                    conteudo: a.blocks.map(b => ({
                        tipo: b.type,
                        texto: b.text,
                        numero_ref: b.number ? String(b.number) : null
                    }))
                }))
        };

        if (finalObj.artigos.length === 0) return alert("Erro: Nenhuma semana preenchida.");

        const jsonStr = JSON.stringify(finalObj, null, 4);
        navigator.clipboard.writeText(jsonStr).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.innerText = "✅ JSON COPIADO!";
            setTimeout(() => btn.innerText = "📋 COPIAR JSON CONSOLIDADO", 2000);
        });
    }

    initTabs();
    loadCurrent();
</script>
</body>
</html>
