<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>ESCRITORIO | notABook X</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="notABook Escritorio">
    <link rel="apple-touch-icon" href="components/assets/splash/icon-192.png">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_17_Pro_Max__iPhone_16_Pro_Max_portrait.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_17_Pro__iPhone_17__iPhone_16_Pro_portrait.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_16_Plus__iPhone_15_Pro_Max__iPhone_15_Plus__iPhone_14_Pro_Max_portrait.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_16__iPhone_15_Pro__iPhone_15__iPhone_14_Pro_portrait.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_8__iPhone_7__iPhone_6s__iPhone_6__4.7__iPhone_SE_portrait.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">

    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link rel="stylesheet" href="components/topo/topo.css">
    <link rel="stylesheet" href="components/auth/auth.css">
    <link rel="stylesheet" href="components/popup/popup.css">
    <link rel="stylesheet" href="components/direita/direita.css">
    <link rel="stylesheet" href="components/direita/brain-idle.css">
    <link rel="stylesheet" href="components/direita/xsat-loading.css">
    <link rel="stylesheet" href="components/direita/xsat-ai.css">
    <link rel="stylesheet" href="components/bible-portal/bible-portal.css">
    <link rel="stylesheet" href="components/office/office.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="office-body">
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">A preparar o escritorio...</div>
    </div>

    <div id="login-screen" style="display:none;">
        <div class="login-card">
            <h2><i class="fa-solid fa-lock" style="color: var(--primary);"></i> Acesso Restrito</h2>
            <input type="email" id="emailInput" placeholder="Email...">
            <input type="password" id="passwordInput" placeholder="Password...">
            <div id="login-error" style="display:none;">Credenciais incorretas.</div>
            <button id="btnLogin">Entrar</button>
        </div>
    </div>

    <nav class="top-menu" id="office-top-menu"></nav>

    <div class="office-sub-bar">
        <div class="office-left-actions">
            <button id="office-btn-search" class="office-icon-btn" title="Pesquisar"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

        <div class="office-nav-center">
            <button id="office-prev" class="office-nav-btn" title="Anterior"><i class="fa-solid fa-chevron-left"></i></button>
            <button id="office-context-title" class="office-brow-title">ESCOLHER CONTEUDO</button>
            <button id="office-next" class="office-nav-btn" title="Proximo"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="office-right-actions">
            <button id="office-btn-xsat" class="office-icon-btn" title="Investigacao X-SAT"><i class="fa-solid fa-satellite-dish"></i></button>
            <button id="office-btn-ai" class="office-icon-btn" title="Bokkai"><i class="fa-brands fa-mailchimp"></i></button>
            <button id="office-btn-settings" class="office-icon-btn" title="Definicoes"><i class="fa-solid fa-gear"></i></button>
        </div>
    </div>

    <div class="office-shell">
        <aside class="office-left-panel" id="office-left-panel">
            <div class="office-tabs">
                <button class="office-tab active" data-tab="atril"><i class="fa-solid fa-book-open-reader"></i> Atril</button>
                <button class="office-tab" data-tab="lists"><i class="fa-solid fa-list-ul"></i> Lists</button>
            </div>
            <div id="office-week-cards" class="office-week-cards"></div>
            <div id="office-left-list" class="office-left-list"></div>
        </aside>

        <main class="office-reader-wrap">
            <div id="office-reader" class="office-reader">
                <div class="office-empty">
                    <i class="fa-solid fa-book-open"></i>
                    <p>Escolhe uma publicacao, livro ou video no Atril.</p>
                </div>
            </div>
        </main>

        <aside id="office-right-col" class="column right-col closed"></aside>
    </div>

    <div id="office-nav-panel" class="office-nav-panel hidden">
        <div class="office-nav-panel-head">
            <span>Navegacao</span>
            <button id="office-nav-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="office-nav-items"></div>
        <div class="office-recent-block">
            <div class="office-recent-title">Recentes</div>
            <div id="office-recent" class="office-recent-row"></div>
        </div>
    </div>

    <div id="office-popup-search" class="popup-overlay">
        <div class="popup-content bible-search-modal">
            <div class="popup-header">
                <h3>Pesquisar no Escritorio</h3>
                <button id="office-search-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="bible-search-body">
                <div class="bible-input-wrapper">
                    <input id="office-search-input" type="text" placeholder="Pesquisar em livros, publicacoes, sentinelas, despertais e multimedia...">
                    <button id="office-search-submit"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <div class="piccard-row" id="office-search-filters">
                    <button class="piccard active" data-filter="livros">Livros</button>
                    <button class="piccard active" data-filter="publicacoes">Publicacoes</button>
                    <button class="piccard active" data-filter="sentinelas">Sentinelas</button>
                    <button class="piccard active" data-filter="despertais">Despertais</button>
                    <button class="piccard active" data-filter="multimedia">Multimedia</button>
                </div>
                <div id="office-search-results"></div>
            </div>
        </div>
    </div>

    <div id="office-popup-scripture" class="office-scripture-popup hidden">
        <div class="office-scripture-head" id="office-scripture-drag">
            <div>
                <strong id="office-scripture-title">Texto biblico</strong>
                <div class="office-scripture-tabs">
                    <button class="active" data-view="text"><i class="fa-solid fa-book-open"></i></button>
                    <button data-view="versions"><i class="fa-solid fa-quote-left"></i></button>
                </div>
            </div>
            <button id="office-scripture-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="office-scripture-body" class="office-scripture-body"></div>
    </div>

    <div id="office-popup-ai" class="popup-overlay">
        <div class="popup-content bible-search-modal" style="max-width: 500px;">
            <div class="popup-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i class="fa-brands fa-mailchimp" style="color:#10b981; font-size:20px;"></i>
                    <h3>Bokkai Escritorio</h3>
                </div>
                <button id="office-ai-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="bible-search-body ai-modal-body">
                <div id="office-ai-messages" class="office-ai-messages"></div>
                <div class="bookai-mode-row office-bookai-mode-row">
                    <button class="bookai-mode-pill active" data-office-ai-mode="net">Net</button>
                    <button class="bookai-mode-pill" data-office-ai-mode="local">Local</button>
                </div>
                <div class="chat-input-wrapper">
                    <input id="office-ai-input" type="text" placeholder="Pergunta sobre esta pagina...">
                    <button id="office-ai-send"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="office-popup-settings" class="popup-overlay">
        <div class="popup-content office-settings-modal">
            <div class="popup-header">
                <h3>Definicoes</h3>
                <button id="office-settings-close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="bible-search-body">
                <div class="setting-item-x">
                    <div class="font-info-row"><label>Texto central</label><span id="office-main-font-val">16px</span></div>
                    <input id="office-main-font" type="range" min="13" max="28" value="16">
                </div>
                <div class="setting-item-x">
                    <div class="font-info-row"><label>Textos biblicos popup</label><span id="office-popup-font-val">15px</span></div>
                    <input id="office-popup-font" type="range" min="12" max="26" value="15">
                </div>
                <div class="layout-toggle-card">
                    <div class="toggle-info">
                        <p class="toggle-title">Ativar Rede de Respostas</p>
                        <p class="toggle-desc">Mesmo estado usado nas definicoes do index.</p>
                    </div>
                    <label class="switch-container">
                        <input type="checkbox" id="office-response-net">
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div id="office-popup-cosmos-area"></div>

    <script type="module" src="components/office/office-main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('notABook Escritorio: Online e Protegido'))
            .catch(err => console.log('Erro PWA Escritorio:', err));
        });
      }
    </script>
</body>
</html>
