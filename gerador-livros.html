<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Pro JW (V28 - Priority Fix)</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --dark: #2c3e50; --bg: #f4f4f9; --pergunta: #e67e22; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); overflow: hidden; }
        .tabs-bar { display: flex; flex-wrap: wrap; background: #ddd; padding: 5px; gap: 3px; border-bottom: 2px solid #bbb; overflow-y: auto; max-height: 120px; }
        .tab { padding: 5px 8px; background: #eee; border: 1px solid #aaa; cursor: pointer; font-weight: bold; font-size: 0.7em; border-radius: 3px; min-width: 25px; text-align: center; }
        .tab.active { background: var(--primary); color: white; border-color: var(--dark); }
        .tab.has-text { border-bottom: 3px solid #f1c40f; } .tab.has-blocks { border-bottom: 3px solid var(--success); }
        .panel { flex: 1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .left { border-right: 2px solid #ddd; max-width: 38%; background: white; }
        .right { background: #f8f9fa; }
        h2 { margin: 0 0 10px 0; font-size: 1.1em; color: var(--dark); }
        label { font-size: 0.7em; font-weight: bold; color: #666; margin-top: 8px; display: block; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { flex: 1; min-height: 150px; resize: none; font-family: monospace; font-size: 0.85em; }
        
        #validator { position: absolute; top: 15px; right: 15px; padding: 8px 12px; border-radius: 8px; font-size: 0.75em; font-weight: bold; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .val-ok { background: var(--success); color: white; }
        .val-warn { background: var(--danger); color: white; }

        .block-item { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; }
        .type-pergunta { border-left: 5px solid var(--pergunta); } .type-paragrafo { border-left: 5px solid var(--primary); }
        .type-subtema { border-left: 5px solid var(--dark); background: #f0f4f8; } 
        .type-rodape { border-left: 5px solid #95a5a6; color: #666; font-style: italic; background: #fdfdfd; }
        
        .page-wrapper { display: flex; flex-direction: column; align-items: center; width: 45px; flex-shrink: 0; }
        .page-input { width: 100%; text-align: center; font-weight: bold; border: 2px solid #ddd; padding: 3px; font-size: 0.8em; }
        .page-input.manual { border-color: var(--success); background: #eafaf1; }
        .content-text { flex: 1; font-size: 0.85em; line-height: 1.4; white-space: pre-wrap; }
        .type-label { font-size: 0.6em; font-weight: 900; text-transform: uppercase; margin-right: 5px; padding: 2px 4px; border-radius: 3px; background: rgba(0,0,0,0.05); }
        .num-tag { background: #333; color: white; padding: 1px 5px; border-radius: 4px; font-size: 0.75em; margin-right: 5px; font-weight: bold; }
        .num-tag-sub { background: #8e44ad; color: white; padding: 1px 5px; border-radius: 4px; font-size: 0.75em; margin-right: 5px; font-weight: bold; }
        .num-tag-auto { background: var(--primary); color: white; padding: 1px 5px; border-radius: 4px; font-size: 0.75em; margin-right: 5px; font-weight: bold; border: 1px dashed white; }
        
        .btn-generate { background: var(--success); height: 50px; font-size: 1.1em; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        #jsonOutput { background: #222; color: #0f0; height: 100px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="panel left">
    <div class="tabs-bar" id="tabsBar"></div>
    <div style="flex:1; display:flex; flex-direction:column; padding-top:10px;">
        <h2 id="editorTitle">Capítulo</h2>
        <div style="display:flex; gap:10px">
            <div style="flex:1"><label>Nº Capítulo</label><input type="number" id="chapNum" oninput="liveUpdate()"></div>
            <div style="flex:3"><label>Título</label><input type="text" id="chapTitle" oninput="liveUpdate()"></div>
        </div>
        <label>Conteúdo</label>
        <textarea id="rawInput" oninput="liveUpdate()" placeholder="Cole o texto aqui..."></textarea>
        <label>Saída JSON:</label>
        <textarea id="jsonOutput" readonly></textarea>
    </div>
</div>

<div class="panel right">
    <div id="validator" class="val-ok">✅ Sincronizado</div>
    <h2>Pré-visualização</h2>
    <div id="previewContainer" style="flex:1; overflow-y:auto; border: 1px solid #ddd; padding: 10px; background: #fff;"></div>
    <button class="btn-generate" onclick="finalizeAll()">🏁 Gerar e Copiar Tudo (JSON)</button>
</div>

<script>
    const TOTAL_CAPS = 50;
    let articles = Array.from({ length: TOTAL_CAPS }, (_, i) => ({ num: i + 1, title: "", raw: "", blocks: [] }));
    let currentIdx = 0;

    function initTabs() {
        const bar = document.getElementById('tabsBar'); bar.innerHTML = '';
        articles.forEach((art, i) => {
            const btn = document.createElement('div');
            const hasText = art.raw && art.raw.trim().length > 0;
            const hasBlocks = art.blocks && art.blocks.length > 0;
            btn.className = `tab ${i === currentIdx ? 'active' : ''} ${hasText ? 'has-text' : ''} ${hasBlocks ? 'has-blocks' : ''}`;
            btn.textContent = i + 1; btn.onclick = () => switchTab(i); bar.appendChild(btn);
        });
    }

    function liveUpdate() {
        articles[currentIdx].num = document.getElementById('chapNum').value;
        articles[currentIdx].title = document.getElementById('chapTitle').value;
        articles[currentIdx].raw = document.getElementById('rawInput').value;
        document.getElementById('editorTitle').textContent = `Capítulo ${articles[currentIdx].num}`;
        if (articles[currentIdx].raw.trim() !== "") { autoProcess(currentIdx); renderPreview(); }
        initTabs();
    }

    function switchTab(newIdx) {
        currentIdx = newIdx;
        const art = articles[currentIdx];
        document.getElementById('chapNum').value = art.num;
        document.getElementById('chapTitle').value = art.title;
        document.getElementById('rawInput').value = art.raw;
        document.getElementById('editorTitle').textContent = `Capítulo ${art.num}`;
        initTabs(); renderPreview();
    }

    function expandRange(str) {
        if (!str) return [];
        const match = str.match(/(\d+)\s*[-–,]\s*(\d+)/);
        if (match) {
            let start = parseInt(match[1]), end = parseInt(match[2]);
            return Array.from({length: end - start + 1}, (_, i) => start + i);
        }
        return str.match(/\d+/g)?.map(Number) || [];
    }

    function autoProcess(idx) {
        const raw = articles[idx].raw;
        let tempBlocks = [];
        let isFootnote = false;
        let isInsideBox = false;
        let pendingParaNums = [];
        let nextParaNum = 1;
        let subthemeCounter = 0;

        const lines = raw.split(/\n+/).filter(l => l.trim() !== "");

        lines.forEach(line => {
            let txt = line.trim();
            
            // 1. ATIVAÇÃO DE RODAPÉ (Prioridade Máxima)
            if (!isFootnote && txt.startsWith('[')) { isFootnote = true; }

            // 2. ATIVAÇÃO DE QUADRO (Stricter matching para evitar parágrafos)
            const boxHeaders = ["PRINCÍPIOS DA BÍBLIA", "RESUMO", "COMO RESPONDERIA?", "QUADRO", "ENTENDA MELHOR", "EXPERIMENTOU?", "LIÇÕES QUE APRENDEMOS"];
            const isBoxStart = boxHeaders.some(h => txt.toUpperCase() === h || (txt.length < 35 && txt.toUpperCase().startsWith(h)));
            if (!isFootnote && isBoxStart) { isInsideBox = true; }

            // 3. IDENTIFICAÇÃO DE MAIÚSCULAS
            const isAllCaps = txt === txt.toUpperCase() && txt.length > 4 && !/^\d+/.test(txt) && !txt.startsWith('“') && !txt.startsWith('[');

            // 4. REGEX DE NÚMEROS
            const qMatch = txt.match(/^(\d+[\d\s\.,\-\(a-z\)]*?\.)\s+(.*)/);
            const pMatch = txt.match(/^(\d+)\s+(.*)/);

            let type = '', cleanText = txt, numberRef = null, isInferred = false;

            if (isFootnote) {
                type = 'rodape';
                const noteMatch = txt.match(/^(\d+)[\.\)]\s+(.*)/);
                if (noteMatch) { numberRef = noteMatch[1]; cleanText = noteMatch[2]; }
                else { cleanText = txt; }
            } 
            // PRIORIDADE: Primeiro verifica se é Pergunta ou Parágrafo numerado (resolve erro 33/34)
            else if (qMatch) {
                type = 'pergunta';
                numberRef = qMatch[1].replace(/\.$/, '');
                cleanText = qMatch[2];
                pendingParaNums = expandRange(numberRef);
                if (pendingParaNums.length > 0) nextParaNum = Math.max(...pendingParaNums) + 1;
            } 
            else if (pMatch) {
                type = 'paragrafo';
                numberRef = pMatch[1];
                cleanText = pMatch[2];
                nextParaNum = parseInt(numberRef) + 1;
                pendingParaNums = pendingParaNums.filter(n => n !== parseInt(numberRef));
            } 
            // Só depois verifica se é Subtema ou Quadro
            else if (isAllCaps || isInsideBox) {
                type = 'subtema';
                subthemeCounter++;
                numberRef = subthemeCounter.toString();
            }
            // Fallback para parágrafo implícito
            else {
                type = 'paragrafo';
                if (pendingParaNums.length > 0) {
                    numberRef = pendingParaNums.shift().toString();
                    isInferred = true;
                } else {
                    numberRef = nextParaNum.toString();
                    isInferred = true;
                    nextParaNum++;
                }
            }
            tempBlocks.push({ type, text: cleanText, number: numberRef, inferred: isInferred });
        });
        articles[idx].blocks = tempBlocks;
        validateIntegrity();
    }

    function validateIntegrity() {
        const blocks = articles[currentIdx].blocks;
        const valDiv = document.getElementById('validator');
        let qCoverage = new Set();
        let pExists = new Set();

        blocks.forEach(b => {
            if (b.type === 'pergunta') expandRange(b.number).forEach(n => qCoverage.add(n));
            if (b.type === 'paragrafo') pExists.add(parseInt(b.number));
        });

        let missQ = [...pExists].filter(n => !qCoverage.has(n));
        let missP = [...qCoverage].filter(n => !pExists.has(n));

        if (missQ.length === 0 && missP.length === 0) {
            valDiv.className = 'val-ok'; valDiv.innerHTML = '✅ Sincronizado';
        } else {
            valDiv.className = 'val-warn';
            valDiv.innerHTML = `⚠️ ${missQ.length>0?'Párs s/ pergunta: '+missQ.join(','):''} ${missP.length>0?'Refs não existem: '+missP.join(','):''}`;
        }
    }

    function renderPreview() {
        const container = document.getElementById('previewContainer'); container.innerHTML = '';
        const blocks = articles[currentIdx].blocks;
        if (blocks.length === 0) return;
        blocks.forEach((block, index) => {
            const div = document.createElement('div');
            div.className = `block-item type-${block.type}`;
            let numTag = block.number ? `<span class="${block.type==='subtema'?'num-tag-sub':(block.inferred?'num-tag-auto':'num-tag')}">${block.type==='subtema'?'ST':''}${block.number}</span>` : '';
            div.innerHTML = `<div class="page-wrapper"><span class="badge">PÁG</span><input type="text" class="page-input" id="p-${index}" value="${block.manualPage || ''}" oninput="articles[currentIdx].blocks[${index}].manualPage = this.value; updateCascading();"></div><div class="content-text"><span class="type-label">${block.type}</span>${numTag} ${block.text}</div>`;
            container.appendChild(div);
        });
        updateCascading();
    }

    function updateCascading() {
        let last = "";
        articles[currentIdx].blocks.forEach((_, i) => {
            const input = document.getElementById(`p-${i}`); if (!input) return;
            if (input.value.trim() !== "") { last = input.value.trim(); input.classList.add('manual'); }
            else { input.classList.remove('manual'); input.placeholder = last || "⬇"; }
        });
    }

    function finalizeAll() {
        const finalExport = articles.filter(art => art.raw.trim() !== "").map(art => {
            let currentPg = null;
            const conteudo = art.blocks.map(b => {
                if (b.manualPage) currentPg = parseInt(b.manualPage);
                return { tipo: b.type, texto: b.text, pagina: currentPg, numero_ref: b.number };
            });
            return { capitulo: parseInt(art.num), titulo: art.title, conteudo: conteudo };
        });
        const jsonStr = JSON.stringify(finalExport, null, 4);
        document.getElementById('jsonOutput').value = jsonStr;
        navigator.clipboard.writeText(jsonStr).then(() => alert("Copiado!"));
    }
    switchTab(0);
</script>
</body>
</html>
