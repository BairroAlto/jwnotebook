<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-RAY | notABook X</title>
    <link rel="manifest" href="manifest-xray.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="notABook XRay">
    <link rel="icon" type="image/svg+xml" href="icons/xray/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/xray/favicon-96x96.png">
    <link rel="shortcut icon" href="icons/xray/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/xray/apple-touch-icon.png">
    
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="components/topo/topo.css">
    <link rel="stylesheet" href="components/xray/xray.css">
    <link rel="stylesheet" href="components/auth/auth.css"> 
    <link rel="stylesheet" href="components/popup/popup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- LOADING INICIAL -->
    <!-- 1. TELAS DE ACESSO (O auth.js vai manipular estas divs) -->
<div id="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Sintonizando Radar...</div>
</div>

<div id="login-screen" style="display: none;"> <!-- Inicia hidden, auth.js mostra se necessário -->
    <div class="login-card">
        <h2><i class="fa-solid fa-lock" style="color: var(--primary);"></i> Acesso Restrito</h2>
        <input type="email" id="emailInput" placeholder="Email...">
        <input type="password" id="passwordInput" placeholder="Password...">
        <div id="login-error" style="display:none; color: #ef4444; font-size: 12px; text-align: center;">Credenciais incorretas.</div>
        <button id="btnLogin">Entrar</button>
    </div>
</div>

    <!-- ÁREAS DE INJEÇÃO MODULAR -->
    <nav class="top-menu" id="area-menu-xray"></nav>
    <div id="area-settings-xray"></div>
    <div id="area-export-xray"></div>
    <div id="area-create-xray"></div>

    <!-- DASHBOARD DE PROJETOS -->
  <div id="xray-dashboard">
    <div class="dashboard-inner"> <!-- Adiciona esta div aqui -->
        <h1 class="dashboard-title">X-RAY <span>Lab</span></h1>
        <p class="dashboard-subtitle">Selecione uma investigação ou inicie uma nova.</p>
        
        <div id="lista-projetos-xray" class="project-grid">
            <!-- Os cards entram aqui -->
        </div>

        <button id="btn-novo-xray" class="btn-xray-main">
            <i class="fa-solid fa-plus"></i> NOVA INVESTIGAÇÃO
        </button>
    </div>
</div>

    <!-- WORKSPACE PRINCIPAL -->
    <div class="xray-grid" id="xray-workspace" style="display: none;">
        <!-- COLUNA ESQUERDA -->
        <div class="xray-col">
            <div class="xray-tabs" id="tabs-esquerda">
                <button class="tab-btn-left active" data-target="editor-manifesto">Manifesto</button>
                <button class="tab-btn-left" data-target="editor-manuscrito">Manuscrito</button>
                <button class="tab-btn-left" id="tab-leitura-esq" data-target="leitura-display">Leitura</button>
            </div>
            <div class="editor-container-wrapper">
                <textarea id="editor-manifesto" class="xray-editor" placeholder="Escreva o texto para análise..."></textarea>
                <textarea id="editor-manuscrito" class="xray-editor" style="display:none;" placeholder="Escreva o manuscrito final..."></textarea>
                <div id="leitura-display" style="display:none; padding: 25px; overflow-y: auto;"></div>
            </div>
        </div>

        <!-- COLUNA DIREITA -->
        <div class="xray-col">
            <div class="xray-tabs">
                <button class="tab-btn-right active" data-tab="biblia">Bíblia</button>
                <button class="tab-btn-right" data-tab="publicacoes">Pubs</button>
                <button class="tab-btn-right" data-tab="livros">Livros</button>
                <button class="tab-btn-right" data-tab="media">Media</button>
                <button class="tab-btn-right" data-tab="resumo" style="color: #fbbf24;">Resumo</button>
                <button class="tab-btn-right" id="tab-leitura-dir" data-tab="leitura" style="display: none; color: #60a5fa;">Leitura</button>
                <button class="tab-btn-right" data-tab="ai" style="color:#10b981"><i class="fa-brands fa-mailchimp"></i> AI</button>
            </div>
            <div id="xray-results-container" style="flex: 1; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- INICIALIZAÇÃO DO MOTOR -->
    <script type="module" src="components/xray/xray-engine.js"></script>
    <script type="module" src="components/xray/xray-main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .catch(err => console.log('Erro PWA XRay:', err));
        });
      }
    </script>

</body>
</html>
