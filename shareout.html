<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook X - Visualização Pública</title>
    
    <!-- Estilos Originais -->
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/typography.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
<style>
    body { overflow-y: auto; height: auto; background-color: #0f172a; padding: 20px; color: white; }
    .public-container { max-width: 850px; margin: 40px auto; padding-bottom: 100px; }
    
    /* 1. DESATIVAR INTERAÇÕES E BOTÕES */
    i, .fa-solid, .fa-regular, .fa-brands, 
    button, .btn-add-abaixo, .lock-indicator { 
        display: none !important; 
    }

    /* 2. LIMPAR CABEÇALHOS DAS FERRAMENTAS (Toolbars) */
    /* Esconde a primeira div interna de cada ferramenta (que é sempre a toolbar) */
    #view-feed > div > div:first-child {
        display: none !important;
    }

    /* 3. RESET DE TEXTO (Leitura Estática) */
    textarea, input { 
        pointer-events: none !important; 
        border: none !important; 
        background: transparent !important; 
        resize: none !important;
        width: 100% !important;
        height: auto !important;
        display: block !important;
        font-family: inherit !important;
        padding: 0 !important;
        overflow: hidden !important;
    }

    /* Estilo para Títulos */
    .tool-title-input { 
        font-weight: 700 !important; 
        color: white !important; 
        font-size: 20px !important;
        margin-bottom: 15px !important;
        opacity: 1 !important;
    }

    /* Estilo para Conteúdo */
    textarea {
        color: #cbd5e1 !important;
        font-size: 16px !important;
        line-height: 1.6 !important;
    }

    /* Ajuste para o Elevador (remover fundos de botões e manter links) */
    .tree-item-pasta-select { background: none !important; border: none !important; pointer-events: none; }
    .f-url { color: #60a5fa !important; opacity: 1 !important; pointer-events: auto !important; cursor: pointer; }
</style>
</head>
<body>
    <div class="public-container">
        <header style="margin-bottom: 50px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
            <h1 id="view-titulo" style="font-size: 32px; font-weight: 600;">A carregar nota...</h1>
            <p style="font-size: 10px; color: var(--primary); text-transform: uppercase; margin-top: 15px; font-weight: 800; letter-spacing: 1px;">
                <i class="fa-solid fa-globe"></i> Documento Partilhado
            </p>
        </header>

        <div id="view-feed" style="display: flex; flex-direction: column; gap: 20px;">
            <!-- Conteúdo injetado pelo JS -->
        </div>
        
        <footer style="margin-top: 80px; text-align: center; opacity: 0.3; font-size: 11px;">
            Criado com Notebook X-Editor
        </footer>
    </div>

    <!-- CAMINHO CORRIGIDO: Verifica se o ficheiro está mesmo nesta pasta -->
    <script type="module" src="./components/share/shareout.js"></script>
</body>
</html>
