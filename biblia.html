<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <title>BÍBLIA | notABook X</title>

    <!-- PWA / iOS mobile -->
    <link rel="manifest" href="manifest-biblia.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="notABook Biblia">
    <link rel="icon" type="image/svg+xml" href="icons/biblia/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="icons/biblia/favicon-96x96.png">
    <link rel="shortcut icon" href="icons/biblia/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/biblia/apple-touch-icon.png">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_17_Pro_Max__iPhone_16_Pro_Max_portrait.png" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_17_Pro__iPhone_17__iPhone_16_Pro_portrait.png" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_16_Plus__iPhone_15_Pro_Max__iPhone_15_Plus__iPhone_14_Pro_Max_portrait.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_16__iPhone_15_Pro__iPhone_15__iPhone_14_Pro_portrait.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">
    <link rel="apple-touch-startup-image" href="components/assets/splash/iPhone_8__iPhone_7__iPhone_6s__iPhone_6__4.7__iPhone_SE_portrait.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)">
    
    <!-- Estilos Base do Ecossistema -->
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="components/topo/topo.css">
    <link rel="stylesheet" href="components/auth/auth.css">
    <link rel="stylesheet" href="components/popup/popup.css">
    
    <!-- Estilo Específico do Portal Bíblia -->
    <link rel="stylesheet" href="components/bible-portal/bible-portal.css">
    
    <!-- Iconografia e Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bible-portal-body">

    <!-- 1. LOADING & LOGIN (Com proteção anti-blink) -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Sintonizando Escrituras...</div>
    </div>

    <div id="login-screen" style="display: none;">
        <div class="login-card">
            <h2><i class="fa-solid fa-lock" style="color: var(--primary);"></i> Acesso Restrito</h2>
            <input type="email" id="emailInput" placeholder="Email...">
            <input type="password" id="passwordInput" placeholder="Password...">
            <div id="login-error" style="display:none; color: #ef4444; font-size: 12px; text-align: center;">Credenciais incorretas.</div>
            <button id="btnLogin">Entrar</button>
        </div>
    </div>

    <!-- 2. BARRA DE MENU SUPERIOR (Sincronizada) -->
    <nav class="top-menu" id="area-menu-bible"></nav>

    <!-- 3. SEGUNDA BARRA: NAVEGAÇÃO E FERRAMENTAS -->
    <div class="bible-sub-bar">
        <!-- Esquerda: Pesquisa, Marcadores e Âncoras -->
        <div class="bible-left-actions">
            <i class="fa-solid fa-magnifying-glass" id="btn-abrir-pesquisa-biblia" title="Pesquisar"></i>
            <i class="fa-solid fa-bookmark" id="btn-abrir-marcadores-biblia" title="Marcadores"></i>
            <i class="fa-solid fa-anchor" id="btn-abrir-ancoras-biblia" title="Âncoras" style="display: none; color: #94a3b8;"></i>
        </div>

        <!-- Centro: Seletor de Livro/Capítulo e Setas -->
        <div class="bible-nav-center">
            <i class="fa-solid fa-chevron-left" id="btn-prev-cap" title="Capítulo Anterior" style="display: none;"></i>
            <div id="bible-context-title">ESCOLHER LIVRO</div>
            <i class="fa-solid fa-chevron-right" id="btn-next-cap" title="Próximo Capítulo" style="display: none;"></i>
        </div>

        <!-- Direita: Parabólica, BookAI e Definições -->
        <div class="bible-right-actions">
            <i class="fa-solid fa-satellite-dish" id="btn-xsat-bible" title="Investigação X-SAT" style="display: none; color: #fbbf24;"></i>
            <i class="fa-brands fa-mailchimp" id="btn-abrir-ai-biblia" title="BookAI Assistente" style="display: none; color: #10b981;"></i>
            <i class="fa-solid fa-gear" id="btn-abrir-settings-bible" title="Definições de Leitura"></i>
        </div>
    </div>

    <!-- 4. ÁREA DE CONTEÚDO PRINCIPAL (Flexbox) -->
    <div class="bible-main-wrapper" style="display: flex;">
        
        <!-- O Leitor de Versículos ou Mosaico de Livros -->
        <main id="bible-reader-container" style="flex: 1; overflow-y: auto;">
            <div id="bible-feed">
                <!-- Injetado via bible-main.js -->
            </div>
        </main>

        <!-- Coluna do Brain (Inicia fechada) -->
        <aside id="bible-right-col" class="column right-col closed">
            <!-- Conteúdo dinâmico do Brain + X-SAT carregado via bible-ui-controller.js -->
        </aside>
    </div>


    <!-- ========================================================== -->
    <!-- 5. POPUPS MODULARES                                        -->
    <!-- ========================================================== -->

    <!-- A. PESQUISA BÍBLICA -->
    <div id="popup-search-bible" class="popup-overlay">
        <div class="popup-content bible-search-modal">
            <div class="popup-header">
                <h3>Pesquisar na Bíblia</h3>
                <button onclick="window.fecharPopup('popup-search-bible')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="bible-search-body">
                <div class="bible-input-wrapper">
                    <input type="text" id="input-bible-query" placeholder='Pesquisa ou "frase exata"...'>
                    <button id="btn-executar-busca-biblia"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
                <div class="piccard-row" id="filter-testamentos">
                    <div class="piccard active" data-filter="tudo">TUDO</div>
                    <div class="piccard" data-filter="antigo">ANTIGO TESTAMENTO</div>
                    <div class="piccard" data-filter="novo">NOVO TESTAMENTO</div>
                </div>
                <div class="piccard-row hidden" id="filter-books-found"></div>
                <div id="bible-search-results"></div>
            </div>
        </div>
    </div>

    <!-- B. NAVEGADOR DE CAPÍTULOS -->
    <div id="bible-nav-panel" class="bible-nav-panel hidden">
        <div class="bible-nav-panel-head">
            <span>Navegacao</span>
            <button onclick="window.fecharPainelNavBiblia()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="bible-nav-content"></div>
    </div>

    <!-- C. MARCADORES -->
    <div id="popup-markers-bible" class="popup-overlay">
        <div class="popup-content bible-search-modal">
            <div class="popup-header">
                <h3>Marcadores Bíblicos</h3>
                <button onclick="window.fecharPopup('popup-markers-bible')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="bible-search-body">
                <div id="bible-markers-list"></div>
            </div>
        </div>
    </div>

    <!-- D. ÂNCORAS TEMÁTICAS -->
    <div id="popup-anchors-bible" class="popup-overlay">
        <div class="popup-content" style="max-width: 400px; width: 90%; border-radius: 24px;">
            <div class="popup-header">
                <h3>Destaques de Âncora</h3>
                <button onclick="window.fecharPopup('popup-anchors-bible')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="bible-search-body">
                <div id="bible-anchors-list" class="xray-pill-grid"></div>
                <button id="btn-limpar-highlights" class="btn-xray-main" style="width:100%; height:40px; margin-top:20px; font-size:10px; display:none;">LIMPAR DESTAQUES</button>
            </div>
        </div>
    </div>

    <!-- E. BOOKAI ASSISTENTE -->
    <div id="popup-ai-bible" class="popup-overlay">
        <div class="popup-content bible-search-modal" style="max-width: 500px;">
            <div class="popup-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <i class="fa-brands fa-mailchimp" style="color: #10b981; font-size: 20px;"></i>
                    <h3 id="ai-bible-title">BookAI Bíblia</h3>
                </div>
                <button onclick="window.fecharPopup('popup-ai-bible')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="ai-tabs-container">
                <button class="ai-tab active" data-target="ai-chat-section">CHAT</button>
                <button class="ai-tab" data-target="ai-protocols-section">PROTOCOLOS</button>
            </div>
            <div class="bible-search-body ai-modal-body">
                <div id="ai-chat-section" class="ai-content-view active">
                    <div id="chat-messages-container"></div>
                    <div class="bookai-mode-row">
                        <button class="bookai-mode-pill active" data-ai-mode="net">Net</button>
                        <button class="bookai-mode-pill" data-ai-mode="local">Local</button>
                    </div>
                    <div class="chat-input-wrapper">
                        <input type="text" id="input-chat-bible" placeholder="Pergunta ao BookAI...">
                        <button id="btn-enviar-chat"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
                <div id="ai-protocols-section" class="ai-content-view">
                    <div id="ai-protocols-grid" class="btn-protocolo-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- F. DEFINIÇÕES DE LEITURA -->
    <div id="popup-settings-bible" class="popup-overlay">
        <div class="popup-content" style="max-width: 350px; width: 90%; border-radius: 24px;">
            <div class="popup-header">
                <h3>Definições</h3>
                <button id="btn-fechar-settings-bible"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="bible-search-body">
                <div class="setting-item-x">
                    <div class="font-info-row">
                        <label>Tamanho Letra (Versículos)</label>
                        <span id="val-font-verses" class="font-val-tag indigo">16px</span>
                    </div>
                    <input type="range" id="range-bible-font-verses" min="12" max="30" value="16" class="x-slider indigo">
                </div>
                <div class="setting-item-x">
                    <div class="font-info-row">
                        <label>Tamanho Letra (Títulos)</label>
                        <span id="val-font-books" class="font-val-tag amber">22px</span>
                    </div>
                    <input type="range" id="range-bible-font-books" min="18" max="40" value="22" class="x-slider amber">
                </div>
                <div class="set-divider"></div>
                <label class="set-label-header">Modo de Visualização</label>
                <div class="view-mode-selector">
                    <button class="view-opt active" data-mode="grid">GRELHA</button>
                    <button class="view-opt" data-mode="sequence">SEQUÊNCIA</button>
                </div>
                <div class="set-divider"></div>
                <div class="layout-toggle-card">
                    <div class="toggle-info">
                        <p class="toggle-title">BookAI Flutuante</p>
                        <p class="toggle-desc">Mover chat para o canto inferior</p>
                    </div>
                    <label class="switch-container">
                        <input type="checkbox" id="check-ai-floating">
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- G. BOOKAI FLUTUANTE -->
    <div id="bookai-floating-zone" class="hidden" style="display: none;">
        <div id="bookai-floating-chat" class="hidden"></div>
        <button id="btn-bookai-float"><i class="fa-brands fa-mailchimp"></i></button>
    </div>
    <!-- Script de inicializacao de eventos (Main) -->
    <script type="module" src="components/bible-portal/bible-main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('notABook Biblia: Online e Protegido'))
            .catch(err => console.log('Erro PWA Biblia:', err));
        });
      }
    </script>

</body>
</html>
