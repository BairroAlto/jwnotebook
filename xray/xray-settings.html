<!-- components/xray/xray-settings.html -->
<div id="popup-settings-xray" class="popup-overlay" style="z-index: 5000;">
    <div class="popup-content" style="max-width: 480px; width: 95%; border-radius: 24px;">
        
        <div class="popup-header" style="padding: 25px 25px 10px 25px; border: none;">
            <h3 style="font-size: 18px; letter-spacing: -0.5px;">Centro de Comando X-RAY</h3>
            <button id="btn-fechar-xray-settings" style="background: rgba(255,255,255,0.05); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i class="fa-solid fa-xmark" style="font-size: 14px;"></i>
            </button>
        </div>

        <!-- SELETOR DE ABAS (Segmented Control) -->
        <div class="settings-tabs-container">
            <button class="tab-settings-btn active" data-target="set-local">Local</button>
            <button class="tab-settings-btn" data-target="set-geral">Geral</button>
        </div>
        
        <div class="settings-scroll-area" style="padding: 10px 25px 30px 25px; max-height: 70vh; overflow-y: auto;">
            
            <!-- ABA 1: LOCAL -->
            <div id="set-local" class="settings-panel active">
                <div class="set-group">
                    <p class="set-label-header">Investigação Ativa <span class="badge-count" id="count-biblia">0</span></p>
                    <p class="set-sub-label">Silenciar textos específicos no radar</p>
                    <div id="piccards-biblia" class="xray-pill-grid"></div>
                </div>

                <div class="set-group" style="margin-top: 25px;">
                    <p class="set-label-header">Fontes de Pesquisa</p>
                    <p class="set-sub-label">Ativar/Desativar repositórios específicos</p>
                    <div id="piccards-categorias" class="xray-pill-grid"></div>
                </div>
            </div>

            <!-- ABA 2: GERAL -->
            <div id="set-geral" class="settings-panel">
                <p class="set-label-header">Interface e Tipografia</p>
                <p class="set-sub-label">Personalize a escala visual das colunas</p>

                <div class="field-font-x">
                    <div class="font-info-row">
                        <label>Editor (Esquerda)</label>
                        <span id="val-range-xray-font-esq" class="font-val-tag indigo">16px</span>
                    </div>
                    <input type="range" id="range-xray-font-esq" min="12" max="24" value="16" class="x-slider indigo">
                </div>

                <div class="field-font-x">
                    <div class="font-info-row">
                        <label>Resultados (Direita)</label>
                        <span id="val-range-xray-font-dir" class="font-val-tag amber">14px</span>
                    </div>
                    <input type="range" id="range-xray-font-dir" min="10" max="20" value="14" class="x-slider amber">
                </div>

                <div class="set-divider"></div>

                <div class="layout-toggle-card">
                    <div class="toggle-info">
                        <p class="toggle-title">Visor na Direita</p>
                        <p class="toggle-desc">Mover aba "Leitura" para a coluna de resultados</p>
                    </div>
                    <label class="switch-container">
                        <input type="checkbox" id="check-leitura-direita">
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>

        </div>
    </div>
</div>
