<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel de Controle - Flecha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.2.0/css/all.min.css">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Alinha ao topo para permitir scroll no mobile */
            min-height: 100vh;
            overflow-y: auto; /* Permite scroll no body */
            box-sizing: border-box;
        }
        .admin-card {
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 680px; /* Largura estendida para melhor usabilidade */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: none;
            margin: 20px 0; /* Espaçamento para scroll no mobile */
        }
        h2 {
            margin-top: 0;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 0.5px;
            color: #f43f5e;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        label {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input, textarea, select {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #f43f5e;
            box-shadow: 0 0 8px rgba(244, 63, 94, 0.3);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        /* Estilos dos Checkboxes dos Utilizadores */
        .users-checkbox-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
        }
        .user-checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 13px;
            user-select: none;
            padding: 4px 0;
        }
        .user-checkbox-item input[type="checkbox"] {
            cursor: pointer;
            accent-color: #f43f5e;
            width: 16px;
            height: 16px;
        }

        /* Cores Disponíveis para Seleção */
        .color-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .color-option {
            border: 2px solid transparent;
            border-radius: 8px;
            height: 38px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
            transition: 0.2s;
        }
        .color-option.selected {
            border-color: white;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .btn-enviar {
            background: #f43f5e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-enviar:hover {
            background: #e11d48;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4);
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #f43f5e;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-msg {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            text-align: center;
        }
        .success-overlay {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .success-overlay i {
            font-size: 48px;
            color: #10b981;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- SINAL DE CARREGAMENTO / AUTENTICAÇÃO -->
    <div id="auth-loader" class="loader">
        <div class="spinner"></div>
        <div class="status-msg" id="loader-text">A autenticar permissões...</div>
    </div>

    <!-- FORMULÁRIO DO FLECHA -->
    <div class="admin-card" id="ruler-form">
        <h2><i class="fa-solid fa-location-arrow"></i> Lançar Nova Atualização</h2>
        
        <div class="field">
            <label for="update-title">Título da Atualização</label>
            <input type="text" id="update-title" placeholder="Escreve o título curto..." required>
        </div>

        <div class="field">
            <label for="update-text">Mensagem da Atualização</label>
            <textarea id="update-text" placeholder="Escreve aqui o texto explicativo da atualização..."></textarea>
        </div>

        <div class="field">
            <label for="update-image">Link da Imagem (Opcional)</label>
            <input type="url" id="update-image" placeholder="https://exemplo.com/imagem.png">
        </div>

        <div class="field">
            <label for="update-video">Link do Vídeo (Opcional)</label>
            <input type="url" id="update-video" placeholder="https://exemplo.com/video.mp4">
        </div>

        <div class="field">
            <label for="update-page">Página do Projeto Destino</label>
            <select id="update-page">
                <option value="index.html">Notas (index.html)</option>
                <option value="book.html">Book (book.html)</option>
                <option value="biblia.html">Bíblia (biblia.html)</option>
                <option value="office.html">Office (office.html)</option>
                <option value="xray.html">X-Ray (xray.html)</option>
                <option value="palco.html">Palco (palco.html)</option>
            </select>
        </div>

        <div class="field">
            <label>Utilizadores Alvo</label>
            <div class="users-checkbox-grid" id="users-checkboxes-container">
                <!-- Preenchido dinamicamente com checkboxes -->
            </div>
            <div style="display:flex; gap:10px; margin-top:6px;">
                <button type="button" id="btn-select-all" style="background:transparent; border:none; color:#f43f5e; font-size:10px; font-weight:800; cursor:pointer; padding:0;">SELECIONAR TODOS</button>
                <span style="color:rgba(255,255,255,0.15)">|</span>
                <button type="button" id="btn-deselect-all" style="background:transparent; border:none; color:#94a3b8; font-size:10px; font-weight:800; cursor:pointer; padding:0;">DESMARCAR TODOS</button>
            </div>
        </div>

        <button class="btn-enviar" id="btn-submit">Enviar Atualização</button>
    </div>

    <!-- SUCESSO -->
    <div class="success-overlay" id="success-screen">
        <i class="fa-solid fa-circle-check"></i>
        <h3>Atualização Lançada!</h3>
        <p style="color: #94a3b8; font-size: 13px; margin-bottom: 20px;">Todos os utilizadores selecionados receberão o popup na página correspondente.</p>
        <button class="btn-enviar" onclick="location.reload()" style="max-width: 150px; margin: 0 auto; display: block; padding: 10px;">Voltar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { firebaseConfig } from './firebase-config.js';

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 🔐 Forçar persistência local para não encerrar sessões noutros separadores
        import("https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js").then((mod) => {
            mod.setPersistence(auth, mod.browserLocalPersistence)
                .then(() => console.log("🔐 FLECHA: Persistência local ativada."))
                .catch((err) => console.error("Erro na persistência do Flecha:", err));
        });

        onAuthStateChanged(auth, async (user) => {
            const loaderText = document.getElementById('loader-text');
            if (user) {
                try {
                    // Verificar se o user tem chave = "ruler"
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().chave === "ruler") {
                        // Carregar lista de utilizadores
                        const usersSnap = await getDocs(collection(db, "users"));
                        const container = document.getElementById('users-checkboxes-container');
                        
                        // Criar opção "Todos" no topo
                        const labelTodos = document.createElement('label');
                        labelTodos.className = 'user-checkbox-item';
                        labelTodos.style.fontWeight = '800';
                        labelTodos.style.borderBottom = '1px solid rgba(255, 255, 255, 0.08)';
                        labelTodos.style.paddingBottom = '8px';
                        labelTodos.style.marginBottom = '4px';
                        labelTodos.innerHTML = `
                            <input type="checkbox" id="checkbox-select-todos">
                            <span style="color: #f43f5e;">TODOS OS UTILIZADORES</span>
                        `;
                        container.appendChild(labelTodos);

                        usersSnap.forEach(uSnap => {
                            const uData = uSnap.data();
                            const uId = uSnap.id;
                            
                            const label = document.createElement('label');
                            label.className = 'user-checkbox-item';
                            label.innerHTML = `
                                <input type="checkbox" class="user-target-checkbox" value="${uId}">
                                <span>${uData.email || uId}</span>
                            `;
                            container.appendChild(label);
                        });

                        // Lógica da opção "Todos"
                        const cbTodos = document.getElementById('checkbox-select-todos');
                        cbTodos.onchange = () => {
                            document.querySelectorAll('.user-target-checkbox').forEach(cb => {
                                cb.checked = cbTodos.checked;
                            });
                        };

                        // Configurar botões de selecionar/deselecionar tudo
                        document.getElementById('btn-select-all').onclick = () => {
                            cbTodos.checked = true;
                            document.querySelectorAll('.user-target-checkbox').forEach(cb => cb.checked = true);
                        };
                        document.getElementById('btn-deselect-all').onclick = () => {
                            cbTodos.checked = false;
                            document.querySelectorAll('.user-target-checkbox').forEach(cb => cb.checked = false);
                        };

                        // Mostrar Formulário
                        document.getElementById('auth-loader').style.display = 'none';
                        document.getElementById('ruler-form').style.display = 'block';
                    } else {
                        loaderText.innerHTML = `<span style="color:#ef4444;"><i class="fa-solid fa-ban"></i> Acesso Negado. Apenas o Ruler pode aceder a esta página.</span>`;
                    }
                } catch (e) {
                    console.error("Erro na verificação de permissões:", e);
                    loaderText.innerHTML = `<span style="color:#ef4444;">Erro ao verificar credenciais.</span>`;
                }
            } else {
                loaderText.innerHTML = `Por favor, faz login no <a href="index.html" style="color:#f43f5e; font-weight:700;">NotaBook</a> primeiro.`;
            }
        });

        // Evento de Envio
        document.getElementById('btn-submit').onclick = async () => {
            const titulo = document.getElementById('update-title').value.trim();
            const texto = document.getElementById('update-text').value.trim();
            const imagem = document.getElementById('update-image').value.trim();
            const video = document.getElementById('update-video').value.trim();
            const pagina = document.getElementById('update-page').value;
            
            const selecionados = Array.from(document.querySelectorAll('.user-target-checkbox:checked')).map(cb => cb.value);

            if (!titulo) {
                alert("Por favor, introduz um título para a atualização.");
                return;
            }

            if (!texto) {
                alert("Por favor, introduz uma mensagem para a atualização.");
                return;
            }

            if (selecionados.length === 0) {
                alert("Por favor, seleciona pelo menos um utilizador alvo.");
                return;
            }

            document.getElementById('ruler-form').style.display = 'none';
            document.getElementById('auth-loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = "A guardar nova atualização...";

            try {
                // Criar documento no Firebase com status inicial = ativo
                await addDoc(collection(db, "updates"), {
                    titulo,
                    texto,
                    imagem: imagem || null,
                    video: video || null,
                    pagina,
                    naovisto: selecionados,
                    visto: [],
                    estado: "ativo",
                    timestamp: serverTimestamp()
                });

                document.getElementById('auth-loader').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';

            } catch (err) {
                console.error("Erro ao guardar:", err);
                alert("Erro ao enviar a atualização. Tenta novamente.");
                document.getElementById('auth-loader').style.display = 'none';
                document.getElementById('ruler-form').style.display = 'block';
            }
        };
    </script>
</body>
</html>
